'4.13':{st:{t:'"In all social systems there must be a class to do the menial duties, to perform the drudgery of life\u2026 It constitutes the very mudsill of society. Our slaves are black, of another and inferior race, and we found them slaves; we use them for our purpose, and call them slaves."',s:'Adapted from James Henry Hammond, speech in the Senate, 1858'},q:'The excerpt exemplifies which development in the antebellum South?',ch:['the hardening of proslavery ideology into a claimed positive good','southern movement toward gradual emancipation plans with compensation','planter acceptance of free-labor economic arguments','the decline of racial justifications for slavery'],ex:'The \u201cmudsill\u201d speech \u2014 apology abandoned for celebration.',kc:'Proslavery thought hardened as abolitionism rose.'},
'5.2':{st:{t:'"Millions of acres await the plow in Oregon\u2019s valleys \u2014 a healthful clime, no fevers, land for every son. The journey is but five months for the resolute."',s:'Adapted from an emigrant\u2019s guide, 1845'},q:'Publications like this contributed most directly to',ch:['mass overland migration during the era of Manifest Destiny','the federal prohibition of settlement beyond the Rockies line','the decline of interest in Pacific coast territories','British consolidation of the entire Oregon Country'],ex:'Boosters sold the trail \u2014 print culture powered the wagon trains.',kc:'Expansion was promoted, organized, and sold as destiny.'},
'5.3':{st:{t:'"Mexico has passed the boundary of the United States, has invaded our territory and shed American blood upon the American soil."',s:'President James K. Polk, war message to Congress, 1846'},q:'Critics such as Congressman Lincoln challenged this message by questioning',ch:['whether the \u201cAmerican soil\u201d was in fact disputed territory','whether Congress possessed the power to declare war','the accuracy of casualty reports from the Pacific coast ports','the legality of annexing Oregon by joint resolution'],ex:'The \u201cspot resolutions\u201d asked exactly where the blood fell \u2014 on land Mexico also claimed.',kc:'The war\u2019s justification was contested from the start.'},
'5.4':{st:{t:'"CAUTION!! Colored people of Boston: you are hereby cautioned to avoid conversing with the watchmen and police officers\u2026 they are empowered to act as KIDNAPPERS and SLAVE CATCHERS."',s:'Adapted from a Boston handbill, 1851'},q:'The handbill responds most directly to',ch:['the Fugitive Slave Act\u2019s conscription of northern authorities','the Supreme Court\u2019s decision in Dred Scott v. Sandford in 1857','the outbreak of guerrilla war in Kansas Territory','the passage of the Kansas-Nebraska Act'],ex:'The 1850 law turned local police into slavery\u2019s agents \u2014 and northern communities into resisters.',kc:'The Fugitive Slave Act radicalized the North.'},
'5.5':{st:{t:'Railroad mileage in 1860:\nFree states \u2014 about 22,000 miles \u00b7 Slave states \u2014 about 9,000 miles',s:'Adapted from U.S. census data'},q:'The data best supports which conclusion about the sections by 1860?',ch:['their economies were developing along diverging paths','the South led the nation in industrial infrastructure','railroads had erased the differences between regions','northern agriculture had collapsed by mid-century'],ex:'Track mileage as proxy \u2014 two economies, one union.',kc:'Sectional divergence was material as well as ideological.'},
'5.6':{st:{t:'"The symbol of the South is the bludgeon; argument is answered with the cane, and the Senate chamber itself is made a field of assault."',s:'Adapted from a northern editorial after the caning of Senator Sumner, 1856'},q:'The editorial is best used as evidence that by 1856',ch:['political violence was displacing debate in national institutions','sectional tensions had eased after the Compromise of 1850 and its measures','the Senate had restored comity between the sections','northern opinion blamed Sumner for the confrontation'],ex:'When argument meets the cane, compromise is already dying.',kc:'The 1850s saw the machinery of compromise break down into violence.'},
'5.7':{st:{t:'"Its foundations are laid, its cornerstone rests, upon the great truth that the negro is not equal to the white man; that slavery\u2014subordination to the superior race\u2014is his natural and normal condition."',s:'Adapted from Alexander Stephens, \u201cCornerstone\u201d speech, 1861'},q:'The excerpt is most useful as evidence of',ch:['the Confederacy\u2019s own statement of its founding purpose','a northern abolitionist\u2019s caricature of secession efforts','the official war aims announced by the Union','border-state arguments for remaining in the Union'],ex:'The Confederate vice president names the cornerstone himself.',kc:'Secessionists identified slavery as the cause in their own words.'},
'5.8':{st:{t:'Resources in 1861:\nUnion \u2014 about 22 million people; roughly 90% of the nation\u2019s manufacturing\nConfederacy \u2014 about 9 million people, including 3.5 million enslaved',s:'Adapted from census summaries'},q:'The data best explains why the Confederacy\u2019s strategy emphasized',ch:['defensive endurance and hopes of foreign recognition','rapid invasion and conquest of the northern states soon','naval blockade of Union ports on the Atlantic','out-producing northern factories in arms'],ex:'Outmatched materially, the South needed will and allies, not conquest.',kc:'Material imbalance shaped both sides\u2019 strategies.'},
'5.9':{st:{t:'"Any person who is the head of a family\u2026 shall be entitled to enter one quarter section of unappropriated public lands\u2026 upon five years\u2019 residence and cultivation."',s:'Homestead Act, 1862'},q:'The act reflects which wartime congressional purpose?',ch:['building a free-labor West while the South was absent from Congress','compensating Confederate planters for wartime losses','reserving the plains for grazing rather than settlement and ranching interests','transferring public land management to the states'],ex:'With secessionists gone, the Republican program \u2014 free soil, free labor \u2014 became law.',kc:'The wartime Congress remade national economic policy.'},
'5.10':{st:{t:'"Every freedman found without lawful employment shall be deemed a vagrant, fined, and hired out to any person who will pay the fine for the shortest period of service."',s:'Adapted from the Mississippi Black Code, 1865'},q:'Laws like this led most directly to',ch:['congressional Reconstruction and the Fourteenth Amendment','the immediate restoration of southern home rule','federal acceptance of presidential Reconstruction in the South','the repeal of the Thirteenth Amendment'],ex:'Bondage rebuilt by statute convinced Congress that \u201crestoration\u201d required intervention.',kc:'The Black Codes triggered Radical Reconstruction.'},
'5.11':{st:{t:'"They whipped me because I voted the radical ticket, and told me they would kill me if I voted it again. I know the men; they are my neighbors."',s:'Adapted from testimony before a congressional committee on Klan violence, 1871'},q:'The testimony best explains',ch:['how terror undermined Black political participation despite the amendments','why southern states expanded Black voter registration','the success of the Fifteenth Amendment without enforcement','federal indifference to violence during the Grant administration and its officials'],ex:'The ballot answered with the whip \u2014 rights on paper, terror in practice.',kc:'Violence hollowed out Reconstruction\u2019s constitutional gains.'}};
Object.assign(QEXTRA,{
'6.2':{st:{t:'Federal land granted to railroad corporations, 1850\u20131871: about 130 million acres \u2014 an area larger than the state of California',s:'Adapted from federal land records'},q:'The data best supports which conclusion about western development?',ch:['federal subsidy, not the market alone, built the railroad West','railroads expanded without any government assistance','public land grants went primarily to homesteading families alone','Congress opposed corporate involvement in expansion'],ex:'An empire of land underwrote the rails \u2014 development was engineered in Washington.',kc:'Federal policy actively financed western economic integration.'},
'6.3':{st:{t:'"We are told Kansas is the land where a black man\u2019s vote is counted and his cabin is his own. Whole church congregations are selling out and starting west together."',s:'Adapted from a letter describing the Exoduster migration, 1879'},q:'The migration described was driven primarily by',ch:['the collapse of Reconstruction\u2019s protections in the South','free railroad passage offered to southern farmers and laborers','a federal program relocating freedpeople westward','the discovery of gold on the Kansas plains'],ex:'When federal protection left the South, thousands sought land and safety in Kansas.',kc:'Black migration was a response to Reconstruction\u2019s abandonment.'},
'6.4':{st:{t:'"We have sowed towns and cities in the place of theories, and put business above politics\u2026 we have fallen in love with work."',s:'Adapted from Henry Grady, \u201cThe New South,\u201d 1886'},q:'The purpose of Grady\u2019s speech was primarily to',ch:['attract northern investment by rebranding the South as industrial','demand federal aid for struggling southern sharecroppers','defend the plantation economy against factory development in the region','call for the restoration of prewar political leadership'],ex:'Delivered to New York businessmen \u2014 the New South was a sales pitch aimed at their capital.',kc:'New South boosterism courted northern investment while cotton and sharecropping persisted.'},
'6.5':{st:{t:'"We propose to turn out a minor invention every ten days and a big thing every six months or so."',s:'Adapted from Thomas Edison on his Menlo Park laboratory, 1876'},q:'The excerpt marks which change in American innovation?',ch:['invention organized as systematic, industrial research','the decline of patenting after the Civil War','government ownership of major laboratories','the end of the lone-inventor tradition by law and statute'],ex:'Invention on a schedule \u2014 the research lab industrialized creativity itself.',kc:'The era institutionalized technological innovation.'},
'6.6':{st:{t:'"The railroad agrees to repay to said company ten cents per barrel on all petroleum shipped, and a like sum on every barrel shipped by any competitor."',s:'Adapted from a rebate agreement of the 1870s'},q:'Arrangements like this enabled Standard Oil to',ch:['undersell and absorb competitors through secret transport advantages','comply with early federal railroad regulation','share profits equally across the refining industry through open published rates','lower consumer prices as its primary goal'],ex:'Paid on rivals\u2019 barrels too \u2014 the rebate was a weapon, not a discount.',kc:'Railroad favoritism powered horizontal consolidation.'},
'6.7':{st:{t:'"We want more schoolhouses and less jails; more books and less arsenals; more learning and less vice; more constant work and less crime; more leisure and less greed."',s:'Adapted from Samuel Gompers, 1893'},q:'The excerpt reflects the AFL\u2019s strategy of seeking',ch:['concrete improvements within the existing wage system','the abolition of private ownership of industry','a farmer-labor political party to contest elections soon','government ownership of the nation\u2019s railroads'],ex:'\u201cMore\u201d \u2014 wages, hours, dignity \u2014 not revolution: bread-and-butter unionism.',kc:'The AFL pursued pragmatic gains, not systemic transformation.'},
'6.8':{st:{t:'Immigrants arriving from southern and eastern Europe:\n1870s \u2014 about 180,000 \u00b7 1900s \u2014 about 6 million',s:'Adapted from U.S. immigration statistics'},q:'The shift shown contributed most directly to',ch:['nativist demands for restriction and literacy tests','a decline in the growth of American cities','the closing of Ellis Island for lack of arrivals then','falling demand for industrial labor'],ex:'New origins at new scale \u2014 the raw material of both urban growth and nativist reaction.',kc:'Shifting immigration fueled the cities and the backlash alike.'},
'6.9':{st:{t:'"The saloon, the machine boss, and the foreign priest arrive on the same ship. Americanism demands the ballot be guarded by the schoolhouse and the English tongue."',s:'Adapted from a nativist society pamphlet, 1890s'},q:'The pamphlet links immigration restriction most closely to',ch:['fears about religion, corruption, and cultural change','concerns over declining transatlantic trade','support for machine politics in immigrant wards and bosses','demands for expanded almshouse funding'],ex:'Saloon, boss, priest \u2014 the nativist trinity of anxieties in one sentence.',kc:'Nativism fused religious, political, and cultural fears.'},
'6.10':{st:{t:'"Send no money! Our catalogue brings the great store to your door: the same piano, the same parlor suite, the same price in Kansas as in Chicago."',s:'Adapted from a mail-order catalog advertisement, 1897'},q:'The advertisement best illustrates the emergence of',ch:['a national consumer market reaching beyond the cities','regional barter economies replacing cash purchases again','the decline of advertising in American retail','luxury consumption confined to eastern elites'],ex:'Same goods, same price, everywhere \u2014 the catalog nationalized consumption.',kc:'Mass distribution built a shared consumer culture.'},
'6.11':{st:{t:'"In my dream of the year 2000, the nation is the sole employer and capitalist; the industry of the country is organized as one great business, and all share alike."',s:'Adapted from Edward Bellamy, Looking Backward, 1888'},q:'The popularity of works like this is best used as evidence of',ch:['widespread unease with competitive industrial capitalism','general satisfaction with Gilded Age arrangements','declining interest in questions of political economy there','support for the gold standard among reformers'],ex:'A utopia selling in the hundreds of thousands measures the era\u2019s discontent.',kc:'Critiques of laissez-faire circulated widely before Progressivism.'},
'6.12':{st:{t:'"Commerce succeeds to manufacture, and is not a part of it. The regulation of monopolies of manufacture belongs to the states."',s:'Adapted from the Supreme Court\u2019s opinion in United States v. E.C. Knight Co., 1895'},q:'The reasoning shown had the effect of',ch:['gutting early federal antitrust enforcement against manufacturers','extending the Sherman Act to cover all corporations and their unions','nationalizing the regulation of manufacturing','breaking up the American Sugar Refining Company'],ex:'If manufacturing is not commerce, the Sherman Act cannot reach it \u2014 regulation in name only.',kc:'Narrow judicial readings shielded corporate power.'},
'6.13':{st:{t:'"Mr. Hanna has assessed the corporations as a tax collector would: the banks, the insurance companies, the railroads \u2014 all have paid to save the country from silver."',s:'Adapted from press commentary on the 1896 McKinley campaign'},q:'The excerpt describes which feature of the 1896 election?',ch:['unprecedented corporate mobilization against the Bryan coalition','a shortage of campaign funds on both sides','the absence of the money question from the campaign and its speeches','Populist control of eastern financial institutions'],ex:'1896 pioneered the corporate-financed national campaign \u2014 and buried free silver.',kc:'The 1896 realignment secured the industrial order politically.'},
'7.2':{st:{t:'"God has made us the master organizers of the world\u2026 He has marked the American people as His chosen nation to finally lead in the regeneration of the world."',s:'Adapted from Senator Albert Beveridge, 1900'},q:'The excerpt justifies empire primarily through',ch:['claims of divine mission and racial destiny','calculations of naval strategy and coaling stations','the economic needs of American agriculture','respect for the self-determination of peoples'],ex:'Providence drafted into policy \u2014 the ideological wing of imperialism.',kc:'Religious and racial ideologies underwrote overseas expansion.'},
'7.3':{st:{t:'"Cuba shall never enter into any treaty which shall impair her independence\u2026 and the United States may exercise the right to intervene for the preservation of Cuban independence."',s:'Adapted from the Platt Amendment, 1901'},q:'The language shown created which relationship?',ch:['a protectorate preserving U.S. control over nominally free Cuba','a full alliance between two equal sovereign states in the Caribbean','immediate Cuban statehood within the Union','the return of Cuba to Spanish administration'],ex:'Independence with a reserved right of intervention \u2014 empire by clause.',kc:'\u201cLiberation\u201d in 1898 produced informal empire.'},
'7.4':{st:{t:'"The senators sit not for the states that elected them but for the interests that financed them; the chamber is a millionaires\u2019 club doing the trusts\u2019 business."',s:'Adapted from a muckraking magazine series, 1906'},q:'Exposure like this contributed most directly to',ch:['the Seventeenth Amendment\u2019s direct election of senators','the creation of the Federal Reserve System','the initiative and referendum in the western states alone','the breakup of the Northern Securities Company'],ex:'\u201cTreason of the Senate\u201d journalism made the appointed Senate indefensible.',kc:'Muckraking converted outrage into structural democratic reform.'},
'7.5':{st:{t:'"The world must be made safe for democracy. Its peace must be planted upon the tested foundations of political liberty."',s:'President Woodrow Wilson, war message to Congress, 1917'},q:'Wilson\u2019s framing presented intervention as',ch:['an idealist crusade rather than a defense of narrow interests','a limited naval action to protect American shipping and commerce','a war of territorial acquisition in the Caribbean','the fulfillment of treaty obligations to France'],ex:'Not ships and loans but democracy itself \u2014 idealism as the case for war.',kc:'Wilson moralized American entry, raising the peace\u2019s stakes.'},
'7.6':{st:{t:'"HALT THE HUN! Every bond you buy is a bullet in the barrel of democracy\u2019s rifle."',s:'Adapted from a Liberty Loan poster, 1918'},q:'Posters like this were produced primarily to',ch:['mobilize civilian money and emotion behind the war effort','report battlefield conditions accurately to the public','recruit immigrants into the American Expeditionary Forces','oppose the Espionage and Sedition Acts'],ex:'The CPI sold the war at home \u2014 finance and fervor in one image.',kc:'Total war required manufacturing consent as well as shells.'},
'7.7':{st:{t:'Automobiles registered in the United States:\n1910 \u2014 about 500,000 \u00b7 1929 \u2014 about 23,000,000',s:'Adapted from federal transportation statistics'},q:'The trend shown transformed the 1920s primarily by',ch:['reshaping work, leisure, and cities around mass consumption','reducing household spending on durable goods','confining automobile ownership to the wealthy and to eastern cities','ending the growth of installment credit'],ex:'From luxury to necessity in a generation \u2014 the car rebuilt daily life and the economy around it.',kc:'Mass production created the first mass-consumption society.'},
'7.8':{st:{t:'"Native, white, Protestant supremacy \u2014 that is our platform. Against the alien flood, the alien creed, and the alien saloon, we stand for America undiluted."',s:'Adapted from a Ku Klux Klan recruiting circular, 1924'},q:'The circular best illustrates that the 1920s Klan',ch:['was a mass nativist movement targeting immigrants and Catholics as well as Black Americans','operated only in the states of the former Confederacy and never organized in northern or western states','concealed its aims behind purely economic language','declined immediately after the First World War'],ex:'The second Klan marched in northern cities \u2014 nativism nationalized the hood.',kc:'The 1920s culture wars pitted \u201c100% Americanism\u201d against a changing nation.'},
'7.9':{st:{t:'"Men in good overcoats stand in the bread line now, collars up, faces turned from the photographer. The line goes around the block and starts again."',s:'Adapted from a reporter\u2019s notebook, New York City, 1931'},q:'The scene is best used as evidence that the Depression',ch:['reached across class lines on an unprecedented scale','affected only unskilled industrial workers','had ended in the cities by the early 1930s','was confined to the agricultural South and West regions'],ex:'Good overcoats in the bread line \u2014 the collapse respected no class boundary.',kc:'The Depression\u2019s breadth destroyed confidence in the old order.'},
'7.10':{st:{t:'"Employees shall have the right to self-organization, to form, join, or assist labor organizations, and to bargain collectively through representatives of their own choosing."',s:'National Labor Relations (Wagner) Act, 1935'},q:'The act transformed labor relations by',ch:['placing federal power behind the right to organize and bargain','outlawing strikes in essential national industries','transferring union regulation entirely to the states and courts','requiring membership in company-sponsored unions'],ex:'Washington entered the shop floor on labor\u2019s side \u2014 membership tripled within a decade.',kc:'The New Deal shifted the legal balance between labor and capital.'},
'7.11':{st:{t:'"The committee finds that the munitions companies rendered existing international tension acute, and that their enormous wartime profits moved the nation toward intervention."',s:'Adapted from the report of the Nye Committee, 1936'},q:'Findings like these contributed most directly to',ch:['the Neutrality Acts restricting arms sales and loans','American entry into the League of Nations and the World Court','the Lend-Lease program of aid to Britain','naval rearmament in the mid-1930s'],ex:'\u201cMerchants of death\u201d became law: no arms, no loans, no repeat of 1917.',kc:'Disillusion with WWI drove depression-era isolationism.'},
'7.12':{st:{t:'Military aircraft produced in the United States:\n1939 \u2014 about 6,000 \u00b7 1944 \u2014 about 96,000',s:'Adapted from War Production Board statistics'},q:'The data best illustrates that victory depended on',ch:['federal mobilization of industrial production at unprecedented scale','private industry operating without government coordination or contracts','imports of aircraft from allied nations','prewar stockpiles accumulated during the 1930s'],ex:'A sixteen-fold surge \u2014 the \u201carsenal of democracy\u201d was organized, financed, and driven from Washington.',kc:'Total war completed the growth of federal economic power.'},
'7.13':{st:{t:'"You are about to embark upon the Great Crusade\u2026 The eyes of the world are upon you. The hopes and prayers of liberty-loving people everywhere march with you."',s:'General Dwight D. Eisenhower, order of the day, June 6, 1944'},q:'The purpose of the order was primarily to',ch:['frame the invasion as a liberating mission and steel morale','announce the operation\u2019s objectives to the enemy','summarize the campaign for American newspapers','request additional forces from the Combined Chiefs in London'],ex:'Words before the ramps dropped \u2014 meaning supplied at the moment of maximum fear.',kc:'D-Day was framed as liberation, defining the war\u2019s moral narrative.'},
'7.14':{st:{t:'"We the peoples of the United Nations, determined to save succeeding generations from the scourge of war, which twice in our lifetime has brought untold sorrow to mankind\u2026"',s:'Preamble of the Charter of the United Nations, 1945'},q:'The language shown reflects which lesson drawn from the interwar years?',ch:['that permanent institutions must replace the failed League experiment','that collective security had proven unnecessary','that the United States should avoid membership again','that peace required the restoration of colonial empires and their mandates'],ex:'\u201cTwice in our lifetime\u201d \u2014 the Charter is the League\u2019s failure written into a second attempt.',kc:'WWII converted the U.S. to institutional internationalism.'},
'8.2':{st:{t:'"Soviet power is impervious to the logic of reason, but it is highly sensitive to the logic of force\u2026 it can easily withdraw when strong resistance is encountered at any point."',s:'Adapted from George Kennan\u2019s \u201cLong Telegram,\u201d 1946'},q:'The analysis shown became the intellectual basis for',ch:['the policy of containment','immediate rollback of Soviet control in Eastern Europe','American withdrawal from European affairs','a formal military alliance with the Soviet Union'],ex:'Patient, firm counter-pressure at every point \u2014 containment in embryo.',kc:'Kennan\u2019s analysis framed four decades of Cold War strategy.'},
'8.3':{st:{t:'"Are you now, or have you ever been, a member of the Communist Party?"',s:'Standard question of the House Committee on Un-American Activities, 1947\u20131950s'},q:'The question symbolizes an era in which',ch:['accusation and association could end careers without proof of any crime','courts required strict evidence before loyalty inquiries and public hearings','communist espionage went entirely uninvestigated','civil liberties expanded during international crisis'],ex:'The question presumed guilt in the asking \u2014 the mechanism of the blacklist.',kc:'The second Red Scare policed belief and association, not just acts.'},
'8.4':{st:{t:'Homeownership rate in the United States:\n1940 \u2014 about 44% \u00b7 1960 \u2014 about 62%',s:'Adapted from U.S. census data'},q:'The change shown resulted most directly from',ch:['federal mortgage guarantees, the GI Bill, and mass suburban construction','the return of housing policy entirely to private markets and private builders','a postwar decline in the American birth rate','the movement of population back into central cities'],ex:'Washington underwrote the suburbs \u2014 the middle class was partly a federal project.',kc:'Postwar prosperity was engineered by policy, and unevenly shared.'},
'8.5':{st:{t:'"Dinner is ready in 25 minutes \u2014 turkey, potatoes, and peas in their own tray. Mother deserves television too!"',s:'Adapted from a frozen-dinner advertisement, 1954'},q:'The advertisement best illustrates which feature of the 1950s?',ch:['a consumer culture organized around convenience, television, and the home','the rejection of domestic ideals by suburban families across the postwar suburbs','declining corporate interest in marketing to women','a shrinking market for household appliances'],ex:'The TV dinner: consumption, domesticity, and the television set in one aluminum tray.',kc:'Postwar culture fused consumption with domestic ideology.'},
'8.6':{st:{t:'"We pledge ourselves to use all lawful means to bring about a reversal of this decision which is contrary to the Constitution, and to prevent the use of force in its implementation."',s:'Declaration of Constitutional Principles (\u201cSouthern Manifesto\u201d), 1956'},q:'The document, signed by over one hundred members of Congress, demonstrates',ch:['organized official resistance to Brown across the white South','congressional consensus in support of desegregation after Brown','the Supreme Court\u2019s reversal of its own ruling','the absence of opposition to school integration'],ex:'Massive resistance had a manifesto \u2014 defiance made respectable by signatures.',kc:'Brown met coordinated official resistance, making enforcement a federal question.'},
'8.7':{st:{t:'"We shall pay any price, bear any burden, meet any hardship, support any friend, oppose any foe, to assure the survival and the success of liberty."',s:'President John F. Kennedy, Inaugural Address, 1961'},q:'The pledge shown committed the United States to',ch:['a global and open-ended Cold War struggle','withdrawal from alliances outside the hemisphere','negotiated coexistence with communist movements everywhere','a defense posture limited to North America'],ex:'\u201cAny price, any burden\u201d \u2014 a blank check whose bills arrived in Vietnam.',kc:'Cold War liberalism globalized American commitments.'},
'8.8':{st:{t:'U.S. military personnel in South Vietnam:\n1961 \u2014 about 3,000 advisers \u00b7 1968 \u2014 about 536,000 troops',s:'Adapted from Department of Defense figures'},q:'The escalation shown proceeded primarily under the authority of',ch:['the Gulf of Tonkin Resolution rather than a declaration of war','a formal declaration of war passed in 1964 by both houses of Congress','a United Nations Security Council mandate','the War Powers Act of 1973'],ex:'From advisers to half a million on one resolution\u2019s blank check.',kc:'Vietnam expanded presidential war power beyond precedent.'},
'8.9':{st:{t:'"The Great Society rests on abundance and liberty for all. It demands an end to poverty and racial injustice, to which we are totally committed in our time."',s:'President Lyndon B. Johnson, University of Michigan commencement, 1964'},q:'The excerpt announced a program that produced',ch:['Medicare, Medicaid, and the War on Poverty','the privatization of Social Security','a balanced federal budget by 1968','the repeal of New Deal labor protections soon'],ex:'Liberalism\u2019s high tide, stated as a total commitment \u2014 and legislated within two years.',kc:'The Great Society extended the New Deal\u2019s promise into health and poverty.'},
'8.10':{st:{t:'"At the bridge the troopers came at us with clubs and gas. We had knelt to pray. I remember thinking: the whole country is watching us bleed."',s:'Adapted from a marcher\u2019s account of \u201cBloody Sunday,\u201d Selma, 1965'},q:'The events described led most directly to',ch:['passage of the Voting Rights Act of 1965','the Supreme Court\u2019s ruling in Brown v. Board','the desegregation of interstate bus terminals','the Civil Rights Act\u2019s public accommodations title'],ex:'Selma\u2019s televised violence broke the dam \u2014 the act passed within months.',kc:'Visible sacrifice converted moral outrage into federal law.'},
'8.11':{st:{t:'"The time has come to confront, with concrete action, the conditions that now prevent women from enjoying the equality of opportunity which is their right, as individual Americans and as human beings."',s:'Adapted from the founding statement of the National Organization for Women, 1966'},q:'The document marks which development of the era?',ch:['the organizational launch of second-wave feminism','the successful ratification of the Equal Rights Amendment','the first demand for women\u2019s suffrage in America','a rejection of legal strategies by women activists'],ex:'Civil-rights-style organization applied to sex discrimination \u2014 the movement institutionalized.',kc:'The rights revolution multiplied across movements after 1965.'},
'8.12':{st:{t:'"Half a million came for the music and stayed to live for three days as if property, schedules, and barbers had never been invented."',s:'Adapted from a reporter\u2019s account of the Woodstock festival, 1969'},q:'The account best illustrates the counterculture\u2019s',ch:['rejection of consumer conformity and conventional authority','alliance with thepolitical establishment','origins in the suburban middle class alone and its comforts','absence of interest in music and gathering'],ex:'Three days outside the rules \u2014 the counterculture staged as a temporary society.',kc:'Youth culture dramatized dissent from postwar conformity.'},
'8.13':{st:{t:'Price of imported crude oil:\nearly 1973 \u2014 about $3 per barrel \u00b7 1974 \u2014 about $12 per barrel',s:'Adapted from energy market data'},q:'The change shown resulted most directly from',ch:['the OPEC embargo following the 1973 Arab-Israeli War','new environmental regulations on domestic refineries','the exhaustion of Middle Eastern oil reserves','price controls imposed by the Nixon administration'],ex:'The embargo quadrupled prices in months \u2014 energy became a weapon and a crisis.',kc:'Oil dependence reshaped the economy and foreign policy of the 1970s.'},
'8.14':{st:{t:'Americans expressing trust in the federal government to do what is right most of the time:\n1964 \u2014 about 77% \u00b7 1980 \u2014 about 27%',s:'Adapted from national survey data'},q:'The collapse shown is best explained by',ch:['Vietnam, Watergate, and economic stagflation in combination','a single financial scandal in the Carter administration alone','the successful conclusion of the Cold War','declining media coverage of national politics'],ex:'Three hammer blows in fifteen years \u2014 the crisis of confidence in one statistic.',kc:'The 1970s ended with institutional trust in ruins.'},
'9.2':{st:{t:'"Register the churches, defend the family, put God back in the schools \u2014 and take back America at the ballot box."',s:'Adapted from a Moral Majority direct-mail appeal, 1980'},q:'The appeal illustrates which development in American politics?',ch:['the mobilization of evangelical voters as a conservative force','the withdrawal of religious groups from public life and politics','bipartisan consensus on social and cultural issues','declining turnout among churchgoing Americans'],ex:'Pulpit organized into precinct \u2014 the religious right became a pillar of the Reagan coalition.',kc:'The New Right fused economic, Cold War, and religious conservatism.'},

'<div class="study-sec"><b>SAQ \u2014 the British debt question (Period 3)</b><br><span style="color:var(--ink2);font-size:13px">Data: British national debt \u2014 1754 \u2248 \u00a375 million \u2192 1763 \u2248 \u00a3133 million.</span>'+
'<p style="margin-top:10px"><b>A 3/3 response:</b></p>'+
'<p style="font-size:14px;line-height:1.6">(a) The debt nearly doubled, rising from about \u00a375 million before the Seven Years\u2019 War to about \u00a3133 million by 1763. <span class="an-yes">\u2713 describes the trend WITH the numbers</span><br>'+
'(b) The war\u2019s global scale drove the borrowing \u2014 Britain fought France in North America, Europe, the Caribbean, and India, then had to garrison the huge territory it won. <span class="an-yes">\u2713 explains a specific historical cause</span><br>'+
'(c) To service the debt, Parliament abandoned salutary neglect and taxed the colonies directly through the Sugar and Stamp Acts, igniting the "no taxation without representation" crisis. <span class="an-yes">\u2713 explains an effect and connects it forward</span></p>'+
'<p style="margin-top:10px"><b>A 1/3 response:</b></p>'+
'<p style="font-size:14px;line-height:1.6">(a) Britain owed a lot more money after the war. <span class="an-no">\u2717 no numbers, no dates \u2014 "describe" requires specifics</span><br>'+
'(b) Because wars cost a lot of money. <span class="an-no">\u2717 restates the trend; names no actual war or expense</span><br>'+
'(c) Britain passed the Stamp Act of 1765 to make the colonists help pay the debt, which they protested as taxation without representation. <span class="an-yes">\u2713 this part earns its point \u2014 specific act, clear connection</span></p>'+
'<p style="font-size:13px;color:var(--ink2)">The difference is never length \u2014 it is specificity plus connection.</p></div>'+
'<div class="study-sec"><b>DBQ \u2014 excerpts from the industrialization essay (Exam tab prompt)</b>'+
'<p style="margin-top:10px"><b>From a high-scoring essay (6\u20137 points):</b></p>'+
'<p style="font-size:14px;line-height:1.65">Emerging from a war that had already taught Washington to mobilize railroads and factories, the United States after 1865 industrialized at unprecedented speed. <span class="an-yes">\u2713 Contextualization</span> While industrialization transformed the scale of the American economy almost totally, it transformed American society only partially \u2014 producing new wealth and new misery that called forth organized responses. <span class="an-yes">\u2713 Thesis: position on extent + line of reasoning</span> The transformation\u2019s scale is undeniable: track mileage quintupled and steel output grew over four-hundred-fold (Doc 4), a triumph men like Carnegie celebrated as the Republic "thundering past" older nations (Doc 1). Yet Carnegie\u2019s verdict must be read as the system\u2019s greatest beneficiary advertising it <span class="an-yes">\u2713 Sourcing: POV explained and used</span> \u2014 the Fall River weaver who testified that "a man alone is nothing against the corporation" (Doc 2) measured the same economy from below, as did the Homestead strikers crushed by Pinkertons in 1892. <span class="an-yes">\u2713 Outside evidence, tied to the argument</span> Change was thus real but unevenly distributed \u2014 a transformation of scale more than of security. <span class="an-yes">\u2713 Complexity: weighing extent</span></p>'+
'<p style="margin-top:10px"><b>From a low-scoring essay (1\u20132 points):</b></p>'+
'<p style="font-size:14px;line-height:1.65">Industrialization transformed American society a lot between 1865 and 1898. <span class="an-no">\u2717 restates the prompt \u2014 no defensible claim, no reasoning</span> Document 1 is by Andrew Carnegie and talks about steel. Document 2 is a worker who had problems. Document 4 has statistics about railroads. <span class="an-no">\u2717 describes documents instead of using them as evidence for an argument</span> This shows things changed a lot. <span class="an-no">\u2717 no outside evidence, no sourcing, no complexity</span></p>'+
'<p style="font-size:13px;color:var(--ink2)">Listing documents earns nothing; deploying them inside an argument earns everything. When you self-score in the Workbench, hold your writing against these.</p></div>';
const THESIS_HTML='<div class="explain hidden" style="margin-top:8px"><b>The formula:</b> “Although <i>[the strongest point against you]</i>, <i>[argument A]</i> and <i>[argument B]</i>; therefore, <i>[your direct answer to “to what extent”]</i>.”<br><span style="color:var(--ink2);font-size:12.5px">The although-clause banks complexity from sentence one. A and B preview your body paragraphs. The therefore-clause answers the actual question — extent, not just “yes.”</span><br><br><b>Worked example:</b> “Although industrialization left farm tenancy and craft labor standing in much of the country, it revolutionized the scale of production and redrew where and how Americans worked; therefore, it transformed the economy almost completely while transforming everyday security only partially.”</div>';

function lessonScores(){return TOPICS.map((t,ti)=>{let d=0;t.qs.forEach((q,qi)=>{if(S.qlast&&S.qlast[ti+'-'+qi]===1)d++;});return{t,ti,pct:d/t.qs.length};});}
const CRAM_TOOLS=['HIPP Trainer','Grouping Game','Workbench'];
function buildCram(n){
  const weak=lessonScores().sort((a,b)=>a.pct-b.pct);
  const plan=[];let wi=0;
  for(let d=1;d<=n;d++){
    if(d===n){plan.push(['Light day. Talk through ONE theme across all 9 periods out loud (Study \u2192 Themes)','Clear any remaining missed questions (Quiz \u2192 Review missed)','One quick HIPP round \u2014 any period \u2014 to keep sourcing reflexes warm','Logistics: Bluebook installed and working, ID ready, device charged. Then sleep. No new content today.']);continue;}
    const picks=[];for(let k=0;k<3&&wi<weak.length;k++,wi++)picks.push(weak[wi]);
    const p=picks[0]?picks[0].t.p:((d-1)%9)+1;
    const p2=picks[1]?picks[1].t.p:p;
    plan.push(['Re-read your weakest lessons: '+picks.map(x=>x.t.code+' '+x.t.name).join(' \u00b7 '),
    'Quiz Period '+p+' until you have 10 correct answers',
    'Flashcards Period '+p+' \u2014 clear the still-learning pile',
    'DBQ '+CRAM_TOOLS[(d-1)%3]+' \u2014 Period '+p2+' (Study tab)',
    (S.missed&&S.missed.length?'Knock out your missed-question list ('+S.missed.length+' waiting)':'Outline one LEQ prompt from your weakest period (Study \u2192 LEQ practice)')]);
  }
  return plan;
}
function makeCram(n){S.cram={n,plan:buildCram(n),done:{}};save();renderExamHub();}

  let h='<div class="panel"><b>\ud83d\udcc5 Cram Planner</b>';

    '<div style="display:flex;gap:8px;margin-top:8px"><button class="btn btn-navy" style="flex:1" data-cram="3">3 days</button><button class="btn btn-navy" style="flex:1" data-cram="5">5 days</button><button class="btn btn-navy" style="flex:1" data-cram="7">7 days</button></div>';
  }else{

  }
  return h+'</div>';
}

let IMG={};
try{IMG=JSON.parse(localStorage.getItem('apush_p19_imgcache_v4')||'{}');}catch(e){IMG={};}
function saveImgCache(){try{localStorage.setItem('apush_p19_imgcache_v4',JSON.stringify(IMG));}catch(e){}}
async function fetchImg(card){
  if(!card.wiki)return null;
  if(IMG[card.id]!==undefined)return IMG[card.id];
  let rec=null;
  try{
    const r=await fetch('https://en.wikipedia.org/api/rest_v1/page/summary/'+encodeURIComponent(card.wiki));
    if(r.ok){
      const j=await r.json();
      const th=j.thumbnail&&j.thumbnail.source;
      const orig=j.originalimage&&j.originalimage.source;
      if(orig&&j.originalimage.width<=600)rec={u:orig};
      else if(th)rec={u:th.replace(/\/(\d+)px-/,'/600px-'),f:th};
      else if(orig)rec={u:orig};
    }
  }catch(e){}
  if(!rec){
    try{
      const r2=await fetch('https://en.wikipedia.org/api/rest_v1/page/media-list/'+encodeURIComponent(card.wiki));
      if(r2.ok){
        const j2=await r2.json();
        const it=(j2.items||[]).find(x=>x.type==='image'&&x.srcset&&x.srcset[0]&&/\.(jpe?g|png)$/i.test(x.title||'')&&!/logo|icon|seal_of|coat_of|flag_of/i.test(x.title||''));
        if(it){
          let u=it.srcset[0].src;
          if(u.startsWith('//'))u='https:'+u;
          rec={u:u.replace(/\/(\d+)px-/,'/600px-'),f:u};
        }
      }
    }catch(e){}
  }
  IMG[card.id]=rec;saveImgCache();return rec;
}
function portraitHTML(card){
  return '<div class="fb-art" aria-hidden="true"><span class="fb-ring">'+EL[card.el][0]+'</span><span class="fb-label">'+esc(EL[card.el][1]).toUpperCase()+'</span></div>';
}
function setPortrait(el,card){
  if(!el)return;
  const put=(url,fb)=>{
    const im=new Image();
    im.alt=card.name;
    im.onload=()=>{if(el.isConnected){el.innerHTML='';el.appendChild(im);}};
    if(fb)im.onerror=()=>put(fb); // 600px missing? retry the API's own thumbnail
    im.src=url;
  };
  if(card.img==='TEACHER'){put(TEACHER_IMG);return;}
  if(IMG_OVERRIDES[card.id]){put(IMG_OVERRIDES[card.id]);return;}
  if(!card.wiki||IMG[card.id]===null)return;
  const c=IMG[card.id];
  if(c){put(c.u,c.f);return;}
  fetchImg(card).then(rec=>{if(rec)put(rec.u,rec.f);});
}

/* ===== NON-TEXT SOURCES ==================================================
   The 2027 exam requires students to read charts, maps and images: SAQ 3 is
   always a non-text source and MCQ sets use them constantly. We draw these
   ourselves as inline SVG rather than hotlinking pictures, so they are
   original work, need no network, and stay legible on a phone.
   Attach one to any stimulus or DBQ document with a `viz` object:
     viz:{t:'TITLE', rows:[['label', number, 'displayed value'], ...],
          note:'optional footnote'}
========================================================================= */
function chartSVG(v){
  if(!v||!v.rows||!v.rows.length) return '';
  const rows=v.rows;
  const max=Math.max.apply(null,rows.map(function(r){ return r[1]; }))||1;
  const W=320, labelW=92, barX=labelW+4, valW=54, barW=W-barX-valW;
  const rh=24, top=v.t?24:4, h=top+rows.length*rh+(v.note?18:4);
  let s='<svg viewBox="0 0 '+W+' '+h+'" role="img" aria-label="'+esc(v.t||'data source')+'" style="width:100%;height:auto;margin-top:10px;display:block">';
  if(v.t) s+='<text x="0" y="11" font-size="10.5" font-family="\'JetBrains Mono\',monospace" letter-spacing=".08em" fill="#0a3161">'+esc(String(v.t).toUpperCase())+'</text>';
  rows.forEach(function(r,i){
    const y=top+i*rh, bw=Math.max(2,r[1]/max*barW), last=i===rows.length-1;
    s+='<text x="0" y="'+(y+12)+'" font-size="11" fill="#3a352f">'+esc(r[0])+'</text>';
    s+='<rect x="'+barX+'" y="'+(y+2)+'" width="'+bw.toFixed(1)+'" height="12" rx="2" fill="'+(last?'#b31942':'#0a3161')+'" opacity="'+(0.55+0.45*(r[1]/max)).toFixed(2)+'"/>';
    s+='<text x="'+(barX+bw+4).toFixed(1)+'" y="'+(y+12)+'" font-size="10.5" font-family="\'JetBrains Mono\',monospace" fill="#3a352f">'+esc(String(r[2]!==undefined?r[2]:r[1]))+'</text>';
  });
  if(v.note) s+='<text x="0" y="'+(h-4)+'" font-size="10" fill="#6b6259">'+esc(v.note)+'</text>';
  return s+'</svg>';
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function stars(n){return '★'.repeat(n)+'☆'.repeat(Math.max(0,6-n));}
function rarColor(r){return getComputedStyle(document.documentElement).getPropertyValue('--c-'+r);}

/* ===== QA SELF-CHECK =====================================================
   Catches authoring bugs before students see them. Add questions, run this.
   In the TEACHER_PREVIEW build a "Run content QA" button appears on Home.
   The build script calls qaRun() directly and fails the build on any ERROR.
   Levels: ERROR = ship-blocking, WARN = look at it, OK = clean.
========================================================================= */
function qaRun(){
  const R=[];
  const add=(lvl,check,msg)=>R.push({lvl:lvl,check:check,msg:msg});
  const ESC_MARKUP=/<\/?[a-zA-Z][^>]*>|&[a-z]+;|&#\d+;/;

  /* 1. Literal markup in fields that get HTML-escaped on render.
        These print as visible tag text to the student (the <br> bug). */
  const bad=[];
  const scan=(where,val)=>{ if(typeof val==='string'&&ESC_MARKUP.test(val)) bad.push(where); };
  TOPICS.forEach(function(t){ t.qs.forEach(function(q,qi){
    const w=t.code+' q'+(qi+1);
    scan(w+' .q',q.q); scan(w+' .ex',q.ex); scan(w+' .kc',q.kc);
    if(q.st){ scan(w+' .st.t',q.st.t); scan(w+' .st.s',q.st.s); }
    (q.ch||[]).forEach(function(c,i){ scan(w+' .ch'+(i+1),c); });
  });});
  FLASH.forEach(function(f,i){ scan('FLASH['+i+'].f',f.f); scan('FLASH['+i+'].b',f.b); });
  CARDS.forEach(function(c){ ['name','ttl','yrs','fact'].forEach(function(k){ scan('CARD '+c.id+'.'+k,c[k]); }); });
  SAQS.forEach(function(s,i){ ['label','attr','a','b','c','check'].forEach(function(k){ scan('SAQ'+(i+1)+'.'+k,s[k]); }); });
  DBQ_SETS.concat([EX_SET]).forEach(function(d,i){
    scan('DBQ'+i+'.prompt',d.prompt);
    (d.docs||[]).forEach(function(doc,j){ scan('DBQ'+i+' doc'+(j+1)+'.attr',doc.attr); scan('DBQ'+i+' doc'+(j+1)+'.hipp',doc.hipp); });
    (d.hipp||[]).forEach(function(h,j){ scan('DBQ'+i+' hipp'+(j+1)+'.q',h.q); scan('DBQ'+i+' hipp'+(j+1)+'.ex',h.ex);
      (h.ch||[]).forEach(function(c,k){ scan('DBQ'+i+' hipp'+(j+1)+'.ch'+(k+1),c); }); });
  });
  if(bad.length) add('ERROR','escaped-markup',bad.length+' field(s) contain HTML that will print as text: '+bad.slice(0,6).join(', ')+(bad.length>6?' …':''));
  else add('OK','escaped-markup','No stray markup in escaped fields.');

  /* 2. Answer-length discipline. Choices are stored correct-first, so ch[0]
        is the key. If the correct answer is usually the longest, the test is
        guessable without knowing any history. Fix by extending distractors. */
  let qTotal=0,longest=0;
  const longQ=[];
  const sub={stimulus:{n:0,l:0},recall:{n:0,l:0}};
  TOPICS.forEach(function(t){ t.qs.forEach(function(q,qi){
    if(!q.ch||q.ch.length<2) return;
    qTotal++;
    const bucket=q.st?sub.stimulus:sub.recall;
    bucket.n++;
    const lens=q.ch.map(function(c){ return String(c).length; });
    if(lens[0]>Math.max.apply(null,lens.slice(1))){ longest++; bucket.l++; longQ.push(t.code+' q'+(qi+1)); }
  });});
  // Report the two kinds separately: a healthy overall rate can hide a badly
  // skewed batch of newly authored questions.
  Object.keys(sub).forEach(function(k){
    const b=sub[k]; if(!b.n) return;
    const r=Math.round(b.l/b.n*1000)/10;
    if(r>40) add('ERROR','answer-length ('+k+')','Correct answer is longest in '+r+'% of the '+b.n+' '+k+' questions \u2014 extend distractors in that batch.');
    else if(r>30) add('WARN','answer-length ('+k+')','Correct answer is longest in '+r+'% of the '+b.n+' '+k+' questions.');
  });
  const pct=qTotal?Math.round(longest/qTotal*1000)/10:0;
  const fair=Math.round(100/4*10)/10;
  if(pct>40) add('ERROR','answer-length','Correct answer is longest in '+pct+'% of questions (chance is ~'+fair+'%). Extend distractors: '+longQ.slice(0,5).join(', ')+' …');
  else if(pct>30) add('WARN','answer-length','Correct answer is longest in '+pct+'% of questions (chance ~'+fair+'%). Worth trimming.');
  else add('OK','answer-length','Correct answer is longest in '+pct+'% of questions (chance ~'+fair+'%).');

  /* 3. Question shape: 4 choices, no duplicates, explanation present. */
  const shape=[];
  TOPICS.forEach(function(t){ t.qs.forEach(function(q,qi){
    const w=t.code+' q'+(qi+1);
    if(!q.ch||q.ch.length!==4) shape.push(w+' has '+((q.ch||[]).length)+' choices');
    else if(new Set(q.ch.map(function(c){return String(c).trim().toLowerCase();})).size!==4) shape.push(w+' has duplicate choices');
    if(!q.ex||!String(q.ex).trim()) shape.push(w+' missing explanation');
    if(!q.kc||!String(q.kc).trim()) shape.push(w+' missing key concept');
  });});
  if(shape.length) add('ERROR','question-shape',shape.length+' problem(s): '+shape.slice(0,5).join('; ')+(shape.length>5?' …':''));
  else add('OK','question-shape',qTotal+' questions, all with 4 unique choices, an explanation and a key concept.');

  /* 4. Flashcard mastery is keyed by ARRAY INDEX. New cards must be appended
        to the end of FLASH or every student's saved progress shifts. */
  const dupF=[];
  const seenF={};
  FLASH.forEach(function(f,i){ const k=String(f.b).trim().toLowerCase(); if(seenF[k]!==undefined) dupF.push(i+' duplicates '+seenF[k]); else seenF[k]=i; });
  const stray=(S.flashKnown||[]).filter(function(i){ return i<0||i>=FLASH.length; });
  if(stray.length) add('ERROR','flashcard-index','Saved progress references '+stray.length+' flashcard index(es) that no longer exist — cards were inserted, not appended.');
  else add('OK','flashcard-index',FLASH.length+' flashcards; saved indices all in range.');
  if(dupF.length) add('WARN','flashcard-dupes','Duplicate flashcard terms: '+dupF.slice(0,4).join(', '));

  /* 5. Glyph safety. Emoji added to Unicode after ~2016 render as empty boxes
        on older school Chromebooks and phones. Draw those as inline SVG. */
  const risky={};
  const sources=[];
  TOPICS.forEach(function(t){ t.qs.forEach(function(q){ sources.push(q.q,q.ex,q.kc,q.st?q.st.t:''); }); });
  FLASH.forEach(function(f){ sources.push(f.f,f.b); });
  CARDS.forEach(function(c){ sources.push(c.name,c.ttl,c.fact); });
  sources.join(' ').replace(/[\s\S]/gu,function(ch){
    const cp=ch.codePointAt(0);
    if((cp>=0x1F900&&cp<=0x1F9FF)||(cp>=0x1FA00&&cp<=0x1FAFF)) risky[ch]=(risky[ch]||0)+1;
    return '';
  });
  const rk=Object.keys(risky);
  if(rk.length) add('WARN','glyph-safety','Recent emoji in content may show as boxes on old devices: '+rk.join(' '));
  else add('OK','glyph-safety','No tofu-prone emoji in question or card content.');

  /* 6. Hand-edited maps: catch typo'd keys that silently do nothing. */
  const cardIds={};
  CARDS.forEach(function(c){ cardIds[c.id]=1; });
  const badImg=Object.keys(IMG_OVERRIDES).filter(function(k){ return !cardIds[k]; });
  if(badImg.length) add('ERROR','img-overrides','IMG_OVERRIDES keys match no card id: '+badImg.join(', '));
  else add('OK','img-overrides',Object.keys(IMG_OVERRIDES).length+' pinned card images, all keys valid.');
  const codes={};
  TOPICS.forEach(function(t){ codes[t.code]=1; });
  const badVid=Object.keys(VIDEO_MAP).filter(function(k){ return !codes[k]; });
  if(badVid.length) add('ERROR','video-map','VIDEO_MAP keys match no lesson code: '+badVid.join(', '));
  else add('OK','video-map',Object.keys(VIDEO_MAP).length+' pinned video links, all keys valid.');

  /* 7. Structural counts. */
  const dupC=[],seenC={};
  CARDS.forEach(function(c){ if(seenC[c.id]) dupC.push(c.id); else seenC[c.id]=1; });
  if(dupC.length) add('ERROR','card-ids','Duplicate card ids: '+dupC.join(', '));
  const dupL=[],seenL={};
  TOPICS.forEach(function(t){ if(seenL[t.code]) dupL.push(t.code); else seenL[t.code]=1; });
  if(dupL.length) add('ERROR','lesson-codes','Duplicate lesson codes: '+dupL.join(', '));
  if(!dupC.length&&!dupL.length) add('OK','ids',TOPICS.length+' lessons and '+CARDS.length+' cards, all uniquely keyed.');
  const thin=TOPICS.filter(function(t){ return t.qs.length<2; }).map(function(t){ return t.code; });
  if(thin.length) add('WARN','question-coverage','Lessons with fewer than 2 questions: '+thin.join(', '));
  const badSet=DBQ_SETS.filter(function(d){ return d.docs.length!==7||d.hipp.length!==6; }).length;
  if(badSet) add('ERROR','dbq-sets',badSet+' DBQ set(s) do not have 6 documents and 6 HIPP items.');
  else add('OK','dbq-sets',DBQ_SETS.length+' DBQ sets, each with 7 documents and 6 HIPP items.');

  return R;
}

function renderQuizHub(){
  let h='<div class="section-title"><h2>Quiz by period</h2><div class="rule"></div></div><div class="period-grid">';
  PERIODS.forEach(p=>{h+='<button class="period-tile" data-p="'+p.n+'"><div class="pn">'+p.n+'</div><div class="py">'+p.y+'</div></button>';});

function questionPool(period,missedOnly){
  const pool=[];
  TOPICS.forEach((t,ti)=>t.qs.forEach((q,qi)=>{
    const id=ti+'-'+qi;
    if(missedOnly){if(S.missed.includes(id))pool.push({t,q,id});}
    else if(t.p===period)pool.push({t,q,id});
  }));
  return pool;
}
function startQuiz(period,missedOnly){
  const pool=shuffle(questionPool(period,missedOnly));
  if(!pool.length){renderQuizHub();return;}
  quiz={period,missedOnly,order:pool,i:0,got:0};
  renderQuestion();
}
let QTIMER=null;function killTimer(){if(QTIMER){clearInterval(QTIMER);QTIMER=null;}}
function renderQuestion(){
  killTimer();
  const item=quiz.order[quiz.i],q=item.q;
  const choices=shuffle(q.ch.map((c,i)=>({c,ok:i===0})));
  let h='<div class="quiz-meta"><span class="pill">'+(quiz.missedOnly?'Missed review':'Period '+quiz.period)+'</span>'+
  '<span>Q '+(quiz.i+1)+' / '+quiz.order.length+'</span>'+(S.timed?'<span class="pill" id="qtimer">60s</span>':'')+'<span class="pill">'+COIN+' '+S.coins+'</span></div>';
  h+='<div class="panel">';
  h+='<div style="font-family:\'JetBrains Mono\',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--rust);margin-bottom:8px">'+esc(item.t.code)+' · '+esc(item.t.name)+'</div>';
  if(q.st)h+='<div class="stimulus"><p>'+esc(q.st.t)+'</p>'+(q.st.viz?chartSVG(q.st.viz):'')+'<span class="src">— '+esc(q.st.s)+'</span></div>';
  h+='<div class="qtext">'+esc(q.q)+'</div>';
  choices.forEach((ch,i)=>{h+='<button class="choice" data-ok="'+(ch.ok?1:0)+'">'+esc(ch.c)+'</button>';});
  h+='<div id="feedback"></div></div>';
  h+='<button class="btn btn-ghost btn-block" id="end-quiz">End quiz</button>';
  $('#view-quiz').innerHTML=h;
  $('#end-quiz').onclick=renderQuizHub;
  $$('#view-quiz .choice').forEach(b=>b.onclick=()=>answer(b,item));
  if(S.timed){let left=60;QTIMER=setInterval(()=>{left--;const el=$('#qtimer');if(!el){killTimer();return;}el.textContent=left+'s';if(left<=10)el.style.color='var(--rust)';if(left<=0){killTimer();const wb=$('#view-quiz .choice[data-ok=\"0\"]');if(wb&&!wb.disabled)wb.click();}},1000);}
}
function answer(btn,item){
  killTimer();
  const ok=btn.dataset.ok==='1';
  $$('#view-quiz .choice').forEach(b=>{b.disabled=true;if(b.dataset.ok==='1')b.classList.add('correct');});
  if(!ok)btn.classList.add('wrong');
  S.answered++;
  let reward='';
  if(ok){
    S.correct++;S.streak++;S.best=Math.max(S.best,S.streak);S.coins++;S.pity++;
    S.missed=S.missed.filter(x=>x!==item.id);
    reward='<div class="reward-flash">'+COIN+' +1 coin';
    if(S.pity>=3){S.pity=0;S.freePacks++;reward+=' · 🎁 Free card pack earned!';}
    reward+='</div>';
    quiz.got++;
  }else{
    S.streak=0;
    if(!S.missed.includes(item.id))S.missed.push(item.id);
  }
  S.qlast=S.qlast||{};S.qlast[item.id]=ok?1:0;
  save();
  const q=item.q;
  $('#feedback').innerHTML=
  '<div class="explain"><b>'+(ok?'Correct.':'Not quite.')+'</b> '+esc(q.ex)+'</div>'+
  '<div class="kc"><b>Key Concept —</b> '+esc(q.kc)+'</div>'+reward+
  '<div style="height:10px"></div><button class="btn btn-primary btn-block" id="next-q">'+(quiz.i+1<quiz.order.length?'Next question':'Finish')+'</button>';
  $('#next-q').onclick=()=>{
    quiz.i++;
    if(quiz.i<quiz.order.length)renderQuestion();
    else{
      $('#view-quiz').innerHTML='<div class="panel" style="text-align:center"><h2 class="pf" style="font-size:24px;margin-bottom:8px">Quiz complete</h2>'+
      '<p style="font-size:15px">You got <b class="mono">'+quiz.got+' / '+quiz.order.length+'</b>.</p>'+
      '<div style="height:12px"></div><button class="btn btn-primary btn-block" id="back-hub">Back to quizzes</button>'+
      '<div style="height:8px"></div><button class="btn btn-navy btn-block" id="to-cards">Open card packs</button></div>';
      $('#back-hub').onclick=renderQuizHub;$('#to-cards').onclick=()=>show('cards');
    }
  };
}

let flashDeck=null,flashI=0,flashPeriod=0,flashAll=false,flashHome=null;
function fid(f){return 'f'+FLASH.indexOf(f);}
function flashPool(p){return FLASH.filter(f=>f.p===p);}
function flashKnownCount(p){const ids=new Set(S.flashKnown||[]);return flashPool(p).filter(f=>ids.has(fid(f))).length;}
function renderFlash(container,period,all){
  flashPeriod=period;flashAll=!!all;
  const known=new Set(S.flashKnown||[]);
  const deck=flashPool(period).filter(f=>flashAll||!known.has(fid(f)));
  if(!deck.length){flashSummary(container);return;}
  flashDeck=shuffle(deck);flashI=0;drawFlash(container);
}
function drawFlash(container){
  const f=flashDeck[flashI],pool=flashPool(flashPeriod);
  container.innerHTML='<div class="quiz-meta"><span class="pill">Flashcards · Period '+flashPeriod+'</span><span>'+(flashI+1)+' / '+flashDeck.length+'</span><span class="pill">⭐ '+flashKnownCount(flashPeriod)+'/'+pool.length+'</span></div>'+
  '<div class="flash-wrap"><div class="flashcard" id="fc" tabindex="0" role="button" aria-label="Flip flashcard">'+
  '<div class="face front"><div class="tag">What is it? Tap to reveal</div><div class="txt">'+esc(f.f)+'</div></div>'+
  '<div class="face back"><div class="tag">The term</div><div class="txt">'+esc(f.b)+'</div></div>'+
  '</div></div>'+
  '<div class="flash-nav"><button class="btn btn-ghost" id="f-learn">↻ Still learning</button><button class="btn btn-primary" id="fflip">Flip</button><button class="btn btn-navy" id="f-know">✓ Know it</button></div>'+
  '<div style="height:10px"></div><button class="btn btn-ghost btn-block" id="fexit">'+(flashHome===renderQuizHub?'Back to quiz':'Back to study')+'</button>';
  const fc=$('#fc',container);
  const flip=()=>fc.classList.toggle('flipped');
  fc.onclick=flip;$('#fflip',container).onclick=flip;
  fc.onkeydown=e=>{if(e.key===' '||e.key==='Enter'){e.preventDefault();flip();}};
  const mark=know=>{
    const id=fid(f);S.flashKnown=S.flashKnown||[];
    if(know){if(!S.flashKnown.includes(id))S.flashKnown.push(id);}
    else S.flashKnown=S.flashKnown.filter(x=>x!==id);
    save();flashI++;
    if(flashI<flashDeck.length)drawFlash(container);else flashSummary(container);
  };
  $('#f-know',container).onclick=()=>mark(true);
  $('#f-learn',container).onclick=()=>mark(false);
  $('#fexit',container).onclick=()=>(flashHome||renderStudyHub)();
}
function flashSummary(container){
  const pool=flashPool(flashPeriod),known=flashKnownCount(flashPeriod),left=pool.length-known;
  container.innerHTML='<div class="panel" style="text-align:center"><h2 class="pf" style="font-size:22px;margin-bottom:8px">Period '+flashPeriod+' flashcards</h2>'+
  '<p style="font-size:15px">Mastered <b class="mono">'+known+'/'+pool.length+'</b>'+(left?' · <b class="mono">'+left+'</b> still learning':' — all mastered! 🎉')+'</p>'+
  '<div style="height:12px"></div>'+
  (left?'<button class="btn btn-primary btn-block" id="f-again">Review still-learning ('+left+')</button><div style="height:8px"></div>':'')+
  '<button class="btn btn-navy btn-block" id="f-all">Review all '+pool.length+' cards</button><div style="height:8px"></div>'+
  '<button class="btn btn-ghost btn-block" id="f-reset">Reset mastery for this period</button><div style="height:8px"></div>'+
  '<button class="btn btn-ghost btn-block" id="f-back">'+(flashHome===renderQuizHub?'Back to quiz':'Back to study')+'</button></div>';
  const a=$('#f-again',container);if(a)a.onclick=()=>renderFlash(container,flashPeriod,false);
  $('#f-all',container).onclick=()=>renderFlash(container,flashPeriod,true);
  $('#f-reset',container).onclick=()=>{const ids=new Set(flashPool(flashPeriod).map(fid));S.flashKnown=(S.flashKnown||[]).filter(x=>!ids.has(x));save();flashSummary(container);};
  $('#f-back',container).onclick=()=>(flashHome||renderStudyHub)();
}

const LEQS=[
{p:1,q:'Many historians argue that contact between Europeans and Native Americans set both worlds on new paths. Evaluate the extent to which European contact transformed societies in the Americas in the period 1491–1607.',ex:'<b>Thesis:</b> Although Native peoples kept real agency through adaptation and resistance, epidemic disease collapsed populations and coerced labor with new racial hierarchies reordered the societies that survived; therefore, contact transformed the Americas to a very great extent.<br><b>Evidence:</b> smallpox depopulation; encomienda; casta system; Columbian Exchange crops/animals.<br><b>Complexity move:</b> weigh transformation against continuity — Native adaptation (horses, trade diplomacy) shows change was negotiated, not total.'},
{p:1,q:'Evaluate the relative importance of causes of European exploration of the Americas in the period 1491–1607.',ex:'<b>Thesis:</b> Although religious zeal and rivalry among crowns pushed every voyage, the search for Asian trade routes and the extraction of American wealth paid for them; therefore, economic motives were the primary driver of exploration, with faith and competition as powerful reinforcements.<br><b>Evidence:</b> Portuguese route-seeking; Spanish silver (Potosí); Tordesillas rivalry; missionary aims.<br><b>Complexity:</b> the motives were braided — conversion justified conquest that profit demanded.'},
{p:2,q:'Evaluate the extent to which the British North American colonies developed distinct regional societies in the period 1607–1754.',ex:'<b>Thesis:</b> Although shared English institutions and Atlantic commerce bound the colonies together, Puritan town-based New England and the plantation Chesapeake grew from different migrations onto different lands; therefore, geography and migration produced sharply distinct regional societies to a great extent.<br><b>Evidence:</b> family vs. male migration; tobacco/rice slavery; House of Burgesses; Navigation Acts.<br><b>Complexity:</b> distinctiveness coexisted with a converging Anglo-American identity.'},
{p:2,q:'Evaluate the extent to which the institution of slavery changed in the British colonies from 1607 to 1754.',ex:'<b>Thesis:</b> Although unfree labor took many forms in the early Chesapeake, cash-crop economics made lifetime bondage profitable and planter fears after Bacon made it law; therefore, slavery changed fundamentally into a hereditary, racial, legally codified system.<br><b>Evidence:</b> 1662 Virginia hereditary law; Bacon\'s Rebellion; Stono Rebellion and slave codes; enslaved majorities in Carolina.<br><b>Complexity:</b> continuity in resistance — covert and overt — ran through every phase.'},
{p:3,q:'Evaluate the extent to which the Seven Years\' War (French and Indian War) changed the relationship between Great Britain and its North American colonies in the period 1754–1776.',ex:'<b>Thesis:</b> Although victory seemed to unite Britain and its colonies in triumph, the debt that followed ended salutary neglect and new taxes collided with colonial habits of self-rule; therefore, the war fundamentally transformed the imperial relationship, converting partners into adversaries.<br><b>Evidence:</b> Proclamation of 1763; Stamp Act and congress; Coercive Acts; committees of correspondence.<br><b>Complexity:</b> colonists initially sought English rights, not independence — change accelerated after 1774.'},
{p:3,q:'Evaluate the extent to which the U.S. Constitution resolved the problems of government under the Articles of Confederation in the period 1781–1800.',ex:'<b>Thesis:</b> Although the framers deferred the deepest conflicts over slavery and federal power through compromise, the new charter fixed the failures of taxation, enforcement, and commerce; therefore, the Constitution resolved the structural crisis to a great extent while guaranteeing a future one.<br><b>Evidence:</b> Shays\' Rebellion vs. Whiskey Rebellion; Great and Three-Fifths compromises; Hamilton\'s plan; Virginia & Kentucky Resolutions.<br><b>Complexity:</b> "resolution" created new arguments — strict vs. loose construction.'},
{p:4,q:'Evaluate the extent to which the Market Revolution transformed American society in the period 1800–1848.',ex:'<b>Thesis:</b> Although the South used the same canals and gins to bind itself more tightly to slavery, the North gained factories, wage labor, and a new middle-class gender order; therefore, the Market Revolution transformed the sections to a great extent — and in opposite directions.<br><b>Evidence:</b> Erie Canal; Lowell mills; cotton gin and the domestic slave trade; cult of domesticity.<br><b>Complexity:</b> integration and division advanced simultaneously.'},
{p:4,q:'Evaluate the relative significance of the effects of the Second Great Awakening on American society in the period 1800–1848.',ex:'<b>Thesis:</b> Although revival began as a matter of individual souls, its converts built abolition, temperance, and the women-led reform network; therefore, the Awakening mattered most for launching organized reform, teaching that society itself could be perfected.<br><b>Evidence:</b> Finney revivals; The Liberator; Seneca Falls; common schools.<br><b>Complexity:</b> the same energy produced conservative reaction and sectional religious schisms.'},
{p:5,q:'Evaluate the extent to which debates over slavery\'s expansion caused the Civil War in the period 1844–1861.',ex:'<b>Thesis:</b> Although economics and blundering politicians each played a part, every acquired territory reopened the slavery question that compromise could no longer answer; therefore, expansion was the primary cause of the war, collapsing the party system into sectional camps.<br><b>Evidence:</b> Wilmot Proviso; Kansas-Nebraska and Bleeding Kansas; Dred Scott; Lincoln\'s 1860 victory.<br><b>Complexity:</b> underlying it lay two incompatible economies and ideologies — expansion was the fuse, not the powder.'},
{p:5,q:'Evaluate the extent to which Reconstruction changed the lives of African Americans in the period 1865–1877.',ex:'<b>Thesis:</b> Although the amendments wrote citizenship, equal protection, and suffrage into the Constitution, enforcement collapsed and land never came; therefore, Reconstruction revolutionized law to a great extent while leaving most freedpeople freedom without independence.<br><b>Evidence:</b> 13th–15th Amendments; Freedmen\'s Bureau schools; sharecropping; Klan violence and 1877.<br><b>Complexity:</b> the amendments were a delayed victory — dormant law later powered the civil rights movement.'},
{p:6,q:'Evaluate the extent to which industrialization transformed the American economy and society in the period 1865–1898.',ex:'<b>Thesis:</b> Although government lagged far behind the change, national markets, corporate power, and immigrant cities remade how Americans worked and lived; therefore, industrialization transformed the nation to a very great extent — economically first, politically last.<br><b>Evidence:</b> transcontinental railroad; Carnegie/Rockefeller integration; Haymarket and Pullman; new immigration.<br><b>Complexity:</b> transformation was contested — Populists and reformers built the counter-vision Progressives enacted.'},
{p:6,q:'Evaluate the relative importance of causes of westward migration in the period 1844–1898.',ex:'<b>Thesis:</b> Although gold, cattle, and wheat supplied the dreams, free land, railroad subsidies, and army campaigns supplied the means; therefore, federal policy was the most important cause of western settlement, activating the hopes that drew migrants.<br><b>Evidence:</b> Homestead Act; transcontinental railroad; mining rushes; Dawes Act and Wounded Knee.<br><b>Complexity:</b> "opportunity" for settlers was dispossession for Native peoples — same cause, opposite effects.'},
{p:7,q:'Evaluate the extent to which the Progressive movement changed the role of the federal government in American life in the period 1890–1920.',ex:'<b>Thesis:</b> Although reform stopped largely at the color line, Progressives made Washington the regulator of food, trusts, banking, and elections; therefore, the movement changed the federal role substantially — from bystander to referee.<br><b>Evidence:</b> Pure Food and Drug Act; Federal Reserve; 17th and 19th Amendments; trust-busting.<br><b>Complexity:</b> continuity — laissez-faire courts and Jim Crow — limited the transformation.'},
{p:7,q:'Evaluate the extent to which the New Deal changed the relationship between the federal government and the American people in the period 1929–1945.',ex:'<b>Thesis:</b> Although it never ended the Depression, the New Deal made Washington the guarantor of economic security through Social Security, labor rights, and financial regulation; therefore, it permanently transformed the relationship between government and citizen.<br><b>Evidence:</b> Social Security Act; Wagner Act; FDIC/SEC; WPA.<br><b>Complexity:</b> change was contested (Court fights, Long, Coughlin) and incomplete — recovery came with war.'},
{p:8,q:'Evaluate the extent to which the civil rights movement changed American society in the period 1945–1980.',ex:'<b>Thesis:</b> Although economic inequality and northern de facto segregation proved far more resistant, litigation, direct action, and federal law dismantled legal segregation and disenfranchisement; therefore, the movement transformed American society to a great extent — completely in law, partially in fact.<br><b>Evidence:</b> Brown; Montgomery and Birmingham; Civil Rights and Voting Rights Acts; post-1965 urban uprisings.<br><b>Complexity:</b> the movement\'s methods and goals diversified — Black Power, and parallel movements it inspired.'},
{p:8,q:'Evaluate the relative importance of causes of declining public trust in the federal government in the period 1963–1980.',ex:'<b>Thesis:</b> Although Watergate confirmed the lesson and stagflation deepened it, Vietnam first taught Americans that their government lied; therefore, the war was the most important cause of collapsing public trust, with scandal and economics as accelerants.<br><b>Evidence:</b> Tet and the credibility gap; Pentagon Papers; Nixon\'s resignation; oil shocks and malaise.<br><b>Complexity:</b> distrust powered both the New Right and post-Watergate reform — one cause, divergent effects.'},
{p:9,q:'Evaluate the extent to which the election of Ronald Reagan marked a turning point in American politics in the period 1968–2000.',ex:'<b>Thesis:</b> Although the conservative turn had been building since 1968, the 1980 election made tax-cutting, deregulation, and skepticism of government the framework both parties governed within; therefore, it marks a genuine turning point to a great extent.<br><b>Evidence:</b> 1981 tax cuts; Moral Majority; Clinton\'s "era of big government is over"; deregulation.<br><b>Complexity:</b> continuity argument — entitlements survived; Reagan bent, not broke, the New Deal state.'},
{p:9,q:'Evaluate the extent to which the end of the Cold War changed United States foreign policy in the period 1980–2001.',ex:'<b>Thesis:</b> Although the alliances and bases of containment outlived their adversary, American policy shifted from rivalry to unrivaled primacy — coalition war, intervention, and trade-led engagement; therefore, the Soviet collapse changed the U.S. role substantially, until 9/11 reorganized it again.<br><b>Evidence:</b> INF Treaty and 1989–91 collapse; Persian Gulf War; NAFTA/WTO; September 11 response.<br><b>Complexity:</b> continuity — global military commitments persisted; only the named enemy changed.'}];

{id:1,attr:'Adapted from a speech of a free-soil congressman, 1847',txt:'I plead the cause of white freemen. The territories must be reserved for free labor \u2014 for the sons of toil of my own race \u2014 and not surrendered to the plantation and the slave.',grp:1,hipp:'Free-soil, not abolition \u2014 opposition to slavery\u2019s expansion framed around white labor\u2019s interests.'},
{id:2,attr:'Adapted from the opinion of Chief Justice Taney, Dred Scott v. Sandford, 1857',txt:'The right of property in a slave is distinctly and expressly affirmed in the Constitution\u2026 Congress has no power to prohibit a citizen from carrying such property into any territory.',grp:2,hipp:'The Court removing the question from politics \u2014 and thereby destroying every existing compromise position.'},
{id:3,attr:'Adapted from South Carolina\u2019s Declaration of the Causes of Secession, 1860',txt:'A geographical line has been drawn across the Union, and a party has elected a man whose opinions and purposes are hostile to slavery. The slaveholding states can no longer remain in safety.',grp:1,hipp:'Secessionists naming their own cause \u2014 the document places slavery, not tariffs, at the center.'},
{id:4,attr:'Abraham Lincoln, \u201cHouse Divided\u201d speech, 1858',txt:'A house divided against itself cannot stand. I believe this government cannot endure permanently half slave and half free\u2026 It will become all one thing, or all the other.',grp:2,hipp:'A politician arguing the middle ground had collapsed \u2014 compromise itself was no longer a stable position.'},
{id:5,attr:'Adapted from an editorial in a southern commercial journal, 1851',txt:'The tariff robs the planter to fatten the northern mill. Our quarrel is with a system that makes the South a colony of Boston and New York, paying tribute in every bale we ship.',grp:3,hipp:'A commercial editor casting the conflict as economic exploitation \u2014 grievance framed in bales and duties.'},
{id:6,attr:'Data adapted from U.S. census and trade statistics',txt:'Cotton exports: 1840 \u2014 about $64 million; 1860 \u2014 about $192 million.<br>Enslaved population: 1840 \u2014 2.5 million; 1860 \u2014 nearly 4 million.',grp:3,hipp:'Numbers measuring the stake \u2014 an economy and labor system growing, not fading, on the eve of war.'},{id:7,attr:'Results of the presidential election of 1860, adapted from official returns',txt:'Official returns from the four-way presidential contest of 1860.',grp:2,hipp:'Official tallies — a president elected by one section alone measures how completely the national parties had broken apart.',viz:{t:'Electoral votes, 1860',rows:[['Lincoln',180,'180'],['Breckinridge',72,'72'],['Bell',39,'39'],['Douglas',12,'12']],note:'Lincoln won with about 40% of the popular vote and no southern states.'}}],

{d:1,q:'Document 2 destroyed the ground for compromise because it held that',ch:['Congress could not bar slavery from any territory','popular sovereignty would decide each territory','the Missouri Compromise line remained binding','enslaved people became free in free states'],ex:'If Congress was powerless, every compromise position \u2014 and the Republican platform \u2014 was unconstitutional.'},

docs:[
{id:1,attr:'Adapted from the Dawes Severalty Act, 1887',txt:'The President is authorized to allot the lands in said reservations in severalty to any Indian located thereon\u2026 one-quarter of a section to each head of family\u2026 and the remaining lands to be purchased for settlement.',grp:1,hipp:'Law as assimilation \u2014 tribal land dissolved into private plots, with the \u201csurplus\u201d opened to settlers.'},
{id:2,attr:'Richard H. Pratt, founder of the Carlisle Indian Industrial School, 1892',txt:'A great general has said that the only good Indian is a dead one. In a sense, I agree with the sentiment, but only in this: that all the Indian there is in the race should be dead. Kill the Indian in him, and save the man.',grp:1,hipp:'An educator stating assimilation\u2019s logic openly \u2014 cultural destruction framed as rescue.'},
{id:3,attr:'Adapted from the surrender speech attributed to Chief Joseph of the Nez Perce, 1877',txt:'Our chiefs are killed\u2026 The little children are freezing to death. Hear me, my chiefs! I am tired. My heart is sick and sad. From where the sun now stands I will fight no more forever.',grp:2,hipp:'A leader\u2019s surrender after a 1,400-mile fighting retreat \u2014 exhaustion and grief recorded at the moment of defeat.'},
{id:4,attr:'Adapted from an agent\u2019s report on the Ghost Dance, 1890',txt:'They dance in circles for days, believing the earth will be made new, the buffalo return, and the dead live again. It is not war they preach, but hope \u2014 yet the settlers demand troops.',grp:2,hipp:'An observer distinguishing a religion of hope from the armed threat settlers imagined \u2014 written weeks before Wounded Knee.'},
{id:5,attr:'Adapted from a Kansas homesteader\u2019s letter, 1878',txt:'We have proved up our claim \u2014 160 acres of our own, which no landlord in the old country could ever have promised. But the grasshoppers took one crop and the drought another, and the railroad takes its share of all the rest.',grp:3,hipp:'A settler weighing free land against nature and railroad rates \u2014 opportunity and dependence in one paragraph.'},
{id:6,attr:'Adapted from a railroad land-department advertisement, 1875',txt:'MILLIONS OF ACRES of the finest farming land in the world, on ten years\u2019 credit! Schools, churches, and markets follow the rails. Come west and grow up with the country!',grp:3,hipp:'A corporation selling its land grant \u2014 promotional purpose explains the paradise it promises.'},{id:7,attr:'Land held by Native nations, adapted from federal Indian Office reports',txt:'Acreage reported by the federal Indian Office before and after allotment began.',grp:1,hipp:'Produced by the agency carrying out the policy — the government’s own accounting of what allotment cost Native nations.',viz:{t:'Land held by Native nations (millions of acres)',rows:[['1881',155,'about 155'],['1890',104,'about 104'],['1900',78,'about 78']],note:'The Dawes Act took effect in 1887.'}}],

{d:1,q:'The point of view of Document 2 is best described as that of',ch:['an assimilationist who saw cultural erasure as benevolence','a reformer defending the preservation of Native languages','a military officer urging renewed warfare on the plains','a critic demanding the closure of the boarding schools'],ex:'Pratt believed he was saving individuals \u2014 by destroying the culture that made them a people.'},
