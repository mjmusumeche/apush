<style>
:root{
  --cream:#f5efe6; --ink:#1c1917; --ink2:#44403c; --paper:#fffdf8;
  --rust:#b31942; --navy:#0a3161; --gold:#b8862b; --sage:#5a7a52;
  --line:#d8cfc0;
  --c-common:#8a7d6b; --c-uncommon:#3f7d4e; --c-rare:#2e5f8a; --c-epic:#7b3fa0; --c-legendary:#b8862b; --c-mythical:#c0392b;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  font-family:'Source Sans 3',sans-serif;color:var(--ink);background:var(--cream);
  min-height:100vh;
}
/* WPA poster backdrop: dawn glow, sunburst rays, navy ground — fixed behind content */
body::before{
  content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:
    radial-gradient(130% 58% at 50% -15%, rgba(10,49,97,.26), rgba(10,49,97,0) 62%),
    repeating-conic-gradient(from 166deg at 50% -18%, rgba(179,25,66,.11) 0deg 5deg, rgba(179,25,66,0) 5deg 11deg),
    radial-gradient(100% 48% at 110% 110%, rgba(179,25,66,.16), rgba(179,25,66,0) 62%),
    radial-gradient(85% 42% at -12% 102%, rgba(10,49,97,.14), rgba(10,49,97,0) 60%),
    linear-gradient(180deg,#faf6ee 0%, #f5efe6 40%, #f1e9da 100%);
}
.app{max-width:480px;margin:0 auto;padding:16px 16px 88px;}
h1,h2,h3,.pf{font-family:'Playfair Display',serif}
.mono{font-family:'JetBrains Mono',monospace}
button{font-family:inherit;cursor:pointer}
.hidden{display:none!important}

/* ---------- Loading overlay ---------- */
#loader{position:fixed;inset:0;background:var(--cream);z-index:99;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.spinner{width:44px;height:44px;border:4px solid var(--line);border-top-color:var(--rust);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loader p{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink2);letter-spacing:.08em}

/* ---------- Hero ---------- */
.hero{
  position:relative;background:var(--ink);color:var(--cream);border-radius:14px;
  padding:26px 22px 22px;overflow:hidden;margin-bottom:18px;
}
.hero::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(45deg, rgba(245,239,230,.05) 0 2px, transparent 2px 14px);}
.hero::after{content:'1491–NOW';position:absolute;right:-8px;bottom:-22px;
  font-family:'Playfair Display',serif;font-weight:900;font-size:74px;color:rgba(245,239,230,.07);letter-spacing:-2px;pointer-events:none}
.mastery{display:inline-block;width:44px;height:6px;background:#e4ddcc;border-radius:3px;margin-left:6px;vertical-align:2px;overflow:hidden}
.mastery i{display:block;height:100%;background:var(--sage);border-radius:3px}
.vlink{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--rust);text-decoration:none;border:1px solid var(--rust);border-radius:999px;padding:1.5px 8px;margin-left:6px;vertical-align:2px;white-space:nowrap;font-weight:700}
.vlink:active{background:var(--rust);color:#fff}
.an-yes{display:inline-block;background:#dcead3;color:#2e4b22;border-radius:4px;padding:0 6px;font-size:11.5px;font-weight:700;margin-left:2px}
.an-no{display:inline-block;background:#f6ddd3;color:#7a2e18;border-radius:4px;padding:0 6px;font-size:11.5px;font-weight:700;margin-left:2px}
.saq-box{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-family:'Source Sans 3',sans-serif;font-size:14px;margin-top:6px;background:var(--paper);resize:vertical}
.thbadge{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.06em;background:var(--navy);color:#fff;border-radius:4px;padding:1.5px 6px;margin-left:4px;vertical-align:2px}
.panel a,.study-sec a{color:var(--navy);text-decoration:underline;font-weight:600}
.flagbar{position:absolute;top:0;left:0;right:0;height:6px;z-index:1;
  background:linear-gradient(90deg,#b31942 0 34%,#f5efe6 34% 67%,#0a3161 67% 100%)}
nav::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:14px 14px 0 0;
  background:linear-gradient(90deg,#b31942 0 34%,#f5efe6 34% 67%,#0a3161 67% 100%)}
.hero .eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;color:var(--gold);text-transform:uppercase}
.hero h1{font-size:42px;font-weight:900;line-height:1.05;margin:8px 0 8px}
.hero p{font-size:14px;color:#d6ccbd;max-width:34ch;position:relative}
.stat-row{display:flex;gap:10px;margin-top:16px;position:relative}
.stat{flex:1;background:rgba(245,239,230,.08);border:1px solid rgba(245,239,230,.18);border-radius:10px;padding:10px 8px;text-align:center}
.stat .n{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:var(--cream)}
.stat .l{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:#b7ab99;margin-top:2px}

/* ---------- Generic panels ---------- */
.panel{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 2px 8px rgba(28,25,23,.08)}
.section-title{display:flex;align-items:baseline;gap:10px;margin:20px 0 10px}
.section-title h2{font-size:21px;font-weight:700}
.section-title .rule{flex:1;height:2px;background:repeating-linear-gradient(90deg,var(--ink) 0 8px,transparent 8px 14px);opacity:.25}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:10px;
  padding:13px 18px;font-size:15px;font-weight:700;transition:transform .08s ease, filter .15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--rust);color:#fff}
.btn-navy{background:var(--navy);color:#fff}
.btn-ghost{background:transparent;border:1.5px solid var(--ink2);color:var(--ink)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-block{width:100%}

.period-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.period-tile{background:var(--paper);border:1.5px solid var(--line);border-radius:12px;padding:12px 8px;text-align:center;transition:border-color .15s}
.period-tile:active{border-color:var(--rust)}
.period-tile .pn{font-family:'Playfair Display',serif;font-weight:900;font-size:22px}
.period-tile .py{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink2);margin-top:2px}

/* ---------- Quiz ---------- */
.stimulus{border:1px solid var(--line);border-left:4px solid var(--navy);background:#f2ecdf;border-radius:8px;padding:12px 14px;margin-bottom:12px}
.stimulus p{font-style:italic;font-size:14.5px;line-height:1.5;white-space:pre-line}
.stimulus .src{font-style:normal;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink2);margin-top:8px;display:block}
.qtext{font-size:17px;font-weight:600;line-height:1.4;margin-bottom:14px}
.choice{display:block;width:100%;text-align:left;background:var(--paper);border:1.5px solid var(--line);border-radius:10px;
  padding:12px 14px;font-size:15px;line-height:1.4;margin-bottom:9px;color:var(--ink)}
.choice:not(:disabled):active{border-color:var(--navy)}
.choice.correct{border-color:var(--sage);background:#eaf2e6;font-weight:600}
.choice.wrong{border-color:var(--rust);background:#f7e8e0}
.choice.sel{border-color:var(--navy);background:#e9edf6;font-weight:600}
.explain{border-radius:10px;padding:13px 14px;margin-top:6px;font-size:14.5px;line-height:1.5;background:#eef1ea;border:1px solid #cbd4c2}
.kc{margin-top:10px;padding:10px 12px;border-radius:8px;background:var(--ink);color:var(--cream);font-size:13.5px;line-height:1.45}
.kc b{color:var(--gold)}
.quiz-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink2)}
.pill{background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:4px 11px}
/* inline SVG icons - drawn by us, never depends on the device emoji font */
.ic{width:1.05em;height:1.05em;display:inline-block;vertical-align:-.16em;flex:none}
.ic-coin{filter:drop-shadow(0 1px 0 rgba(0,0,0,.18))}
.reward-flash{background:#fdf3dd;border:1px solid var(--gold);color:#6d4f14;border-radius:8px;padding:9px 12px;font-size:13.5px;margin-top:10px}

/* ---------- Flashcards ---------- */
.flash-wrap{perspective:1200px}
.flashcard{position:relative;width:100%;min-height:230px;transform-style:preserve-3d;transition:transform .5s}
.flashcard.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px;text-align:center}
.face.front{background:var(--paper);border:1.5px solid var(--line)}
.face.back{background:var(--ink);color:var(--cream);transform:rotateY(180deg)}
.face .tag{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--rust);margin-bottom:10px}
.face.back .tag{color:var(--gold)}
.face .txt{font-size:16.5px;line-height:1.5}
.face.back .txt{font-family:'Playfair Display',serif;font-size:24px;font-weight:700}
.flash-nav{display:flex;gap:10px;margin-top:12px}
.flash-nav .btn{flex:1}

/* ---------- Collectible cards ---------- */
.coinbar{display:flex;gap:10px;align-items:center;justify-content:space-between;background:var(--ink);color:var(--cream);border-radius:12px;padding:12px 16px;margin-bottom:14px}
.coinbar .mono{font-size:15px}
.collection-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.mini-card{border-radius:10px;border:1.5px solid var(--line);background:var(--paper);padding:10px;text-align:center;min-height:96px;display:flex;flex-direction:column;justify-content:center;gap:4px}
.mini-card.owned{border-width:2.5px}
.mini-card .nm{font-weight:700;font-size:13.5px;line-height:1.25}
.mini-card .rr{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase}
.mini-card .thumb{height:64px;display:flex;align-items:center;justify-content:center;font-size:24px}
.mini-card .thumb img{max-height:64px;max-width:100%;object-fit:contain;border-radius:6px}
.mini-card.locked{opacity:.5;filter:grayscale(.7)}
.mini-card.locked .nm{color:var(--ink2)}

.tcg{position:relative;width:300px;max-width:88vw;margin:0 auto;border-radius:16px;padding:8px;color:#f5efe6;background:var(--paper);box-shadow:0 14px 34px rgba(28,25,23,.45);overflow:hidden}
.tcg .inner{position:relative;border-radius:10px;overflow:hidden;height:470px;background:#141110}
.tcg .art{position:absolute;inset:0;z-index:1}
.tcg .art img{width:100%;height:100%;object-fit:cover;display:block}
.tcg .scrim-top{position:absolute;top:0;left:0;right:0;z-index:2;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;padding:11px 12px 28px;background:linear-gradient(180deg,rgba(14,11,9,.9) 0%,rgba(14,11,9,.5) 55%,rgba(14,11,9,0) 100%)}
.tcg .scrim-top .nm{font-family:'Playfair Display',serif;font-weight:900;font-size:18px;line-height:1.12;text-shadow:0 1px 3px rgba(0,0,0,.65)}
.tcg .scrim-top .hp{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;white-space:nowrap;background:rgba(14,11,9,.6);border:1px solid rgba(245,239,230,.35);border-radius:999px;padding:3px 9px}
.tcg .scrim-bot{position:absolute;left:0;right:0;bottom:0;z-index:2;padding:36px 12px 10px;background:linear-gradient(0deg,rgba(14,11,9,.95) 0%,rgba(14,11,9,.85) 58%,rgba(14,11,9,0) 100%)}
.tcg .subtitle{display:flex;justify-content:space-between;align-items:center;font-size:12px}
.tcg .subtitle .ttl{font-weight:700;color:#f2e7cf}
.tcg .subtitle .yrs{font-family:'JetBrains Mono',monospace;font-size:11px;color:#cdbfa4}
.tcg .badge{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;background:rgba(233,199,102,.92);color:#2a1f08;border-radius:4px;padding:2px 7px;margin-top:6px}
.tcg .factbox{margin-top:7px;background:rgba(245,239,230,.1);border:1px solid rgba(245,239,230,.22);border-radius:8px;padding:8px 10px;font-size:12.4px;line-height:1.42;color:#efe7d6;backdrop-filter:blur(2px)}
.tcg .foot{display:flex;justify-content:space-between;align-items:center;margin-top:7px;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#c8bb9f}
.tcg .inner::before{content:'';position:absolute;inset:0;z-index:3;pointer-events:none;background:linear-gradient(115deg,rgba(255,70,130,.15),rgba(80,180,255,.13) 45%,rgba(140,255,170,.13) 70%,rgba(255,220,120,.15));background-size:300% 300%;mix-blend-mode:overlay;animation:holo 6s ease-in-out infinite}
.tcg .inner::after{content:'';position:absolute;inset:0;z-index:3;pointer-events:none;background:linear-gradient(115deg,transparent 32%,rgba(255,255,255,.5) 46%,rgba(255,255,255,.14) 52%,transparent 64%);background-size:260% 100%;animation:shimmer 3.2s ease-in-out infinite}
@keyframes holo{0%,100%{background-position:0% 0%}50%{background-position:100% 100%}}
@keyframes shimmer{0%{background-position:120% 0}55%{background-position:-90% 0}100%{background-position:-90% 0}}
.fb-art{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  background:repeating-conic-gradient(from 0deg at 50% 130%, rgba(28,25,23,.05) 0deg 6deg, rgba(28,25,23,0) 6deg 12deg),linear-gradient(180deg,#efe6d2,#e2d5ba)}
.fb-ring{width:86px;height:86px;border:3px double var(--ink2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:40px;background:rgba(255,253,248,.7);box-shadow:0 2px 8px rgba(28,25,23,.12)}
.fb-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.3em;color:var(--ink2)}
.mini-card .thumb .fb-art{border-radius:6px;gap:3px}
.mini-card .thumb .fb-ring{width:44px;height:44px;font-size:20px;border-width:2px}
.mini-card .thumb .fb-label{display:none}
.tcg.lay-c{color:var(--ink)}
.tcg.lay-c .inner{height:auto;background:#fbf7ee}
.tcg.lay-c .inner::before{display:none}
.tcg.lay-c .head{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 12px 7px}
.tcg.lay-c .head .nm{font-family:'Playfair Display',serif;font-weight:900;font-size:17px;line-height:1.1}
.tcg.lay-c .head .hp{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;white-space:nowrap}
.tcg.lay-c .art{position:relative;inset:auto;height:200px;background:linear-gradient(180deg,#ece4d3,#e0d5bf);border-top:1px solid rgba(28,25,23,.12);border-bottom:1px solid rgba(28,25,23,.12)}
.tcg.lay-c .art img{object-fit:contain}
.tcg.lay-c .subtitle{padding:7px 12px 0}
.tcg.lay-c .subtitle .ttl{color:var(--ink)}
.tcg.lay-c .subtitle .yrs{color:var(--ink2)}
.tcg.lay-c .badge{background:var(--ink);color:var(--cream);margin:6px 12px 0}
.tcg.lay-c .factbox{margin:8px 12px;background:#f1ead9;border:1px solid rgba(28,25,23,.14);color:var(--ink);backdrop-filter:none}
.tcg.lay-c .foot{margin:0;padding:2px 12px 10px;color:var(--ink2)}
.tcg.r-common{border:5px solid var(--c-common)}
.tcg.r-uncommon{border:5px solid var(--c-uncommon)}
.tcg.r-rare{border:5px solid var(--c-rare)}
.tcg.r-epic{border:5px solid var(--c-epic)}
.tcg.r-legendary{border:5px solid transparent;background:linear-gradient(var(--paper),var(--paper)) padding-box,linear-gradient(135deg,#8a5f10,#e9c766,#8a5f10) border-box;background-size:auto,300% 300%;animation:borderflow 8s linear infinite}
.tcg.r-mythical{border:5px solid transparent;background:linear-gradient(var(--paper),var(--paper)) padding-box,linear-gradient(135deg,#c0392b,#e9c766,#7b3fa0,#c0392b) border-box;background-size:auto,300% 300%;animation:mythglow 2s ease-in-out infinite,borderflow 5s linear infinite}
@keyframes mythglow{0%,100%{box-shadow:0 0 14px 2px rgba(192,57,43,.55)}50%{box-shadow:0 0 40px 12px rgba(233,199,102,.85)}}
.tcg.lay-c.r-common .inner::after{display:none}
.tcg.r-epic .inner{box-shadow:inset 0 0 0 1px rgba(123,63,160,.55),inset 0 0 22px rgba(123,63,160,.3)}
.tcg.r-epic .inner::before{animation-duration:3.8s;background:linear-gradient(115deg,rgba(255,70,130,.19),rgba(123,63,160,.22) 45%,rgba(80,180,255,.17) 70%,rgba(255,220,120,.19));background-size:280% 280%}
.tcg.r-legendary .scrim-top .nm{background:linear-gradient(100deg,#f6dc8c,#fff6cf 40%,#caa23c 80%);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 1px 2px rgba(0,0,0,.7))}
.tcg.r-legendary .inner{box-shadow:inset 0 0 0 1px rgba(233,199,102,.65),inset 0 0 26px rgba(233,199,102,.3)}
.tcg.r-mythical .scrim-top .nm{background:linear-gradient(100deg,#ff8ab0,#ffe08a 35%,#8ad2ff 70%,#c39bff);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 1px 2px rgba(0,0,0,.75))}
.tcg.r-mythical .inner{box-shadow:inset 0 0 0 1px rgba(255,255,255,.5),inset 0 0 30px rgba(233,199,102,.35)}
.tcg.r-mythical .inner::before{background:linear-gradient(115deg,rgba(255,60,130,.3),rgba(80,180,255,.26) 40%,rgba(150,255,170,.26) 65%,rgba(255,210,90,.3));background-size:250% 250%;animation:holo 3.2s ease-in-out infinite}
.sparkles{position:absolute;inset:0;z-index:4;pointer-events:none;background-image:radial-gradient(2px 2px at 18% 28%,rgba(255,255,255,.95),transparent 65%),radial-gradient(1.5px 1.5px at 72% 18%,rgba(255,255,255,.9),transparent 65%),radial-gradient(2px 2px at 86% 62%,rgba(255,255,255,.95),transparent 65%),radial-gradient(1.5px 1.5px at 32% 78%,rgba(255,255,255,.9),transparent 65%),radial-gradient(1.2px 1.2px at 56% 46%,rgba(255,255,255,.85),transparent 65%),radial-gradient(1.6px 1.6px at 10% 60%,rgba(255,255,255,.9),transparent 65%);animation:twinkle 2.2s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.2}50%{opacity:1}}
@keyframes borderflow{from{background-position:0 0,0% 50%}to{background-position:0 0,300% 50%}}
@media (prefers-reduced-motion: reduce){.tcg .inner::after,.tcg .inner::before,.tcg.r-mythical,.tcg.r-legendary,.sparkles,.flashcard{animation:none;transition:none}}
.stars{letter-spacing:2px}

/* Pack modal */
#modal{position:fixed;inset:0;background:rgba(28,25,23,.82);z-index:60;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:16px}
#modal .modal-note{color:var(--cream);font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase}
.banner-done{background:linear-gradient(135deg,#8a5f10,#e9c766);color:#3d2a06;border-radius:12px;padding:14px 16px;text-align:center;font-weight:700;margin-bottom:14px}

/* ---------- Study ---------- */
.topic{border:1px solid var(--line);border-radius:12px;background:var(--paper);margin-bottom:10px;overflow:hidden}
.topic > button{width:100%;text-align:left;background:none;border:none;padding:14px 16px;font-size:15.5px;font-weight:700;display:flex;justify-content:space-between;gap:10px;align-items:center;font-family:'Source Sans 3',sans-serif;color:var(--ink)}
.topic .chev{transition:transform .2s;color:var(--rust)}
.topic.open .chev{transform:rotate(90deg)}
.topic .body{display:none;padding:0 16px 14px}
.topic.open .body{display:block}
.study-sec{border-top:1px dashed var(--line);padding:11px 0;font-size:14.5px;line-height:1.55}
.study-sec b{color:var(--rust)}

/* ---------- Bottom nav ---------- */
nav{position:fixed;overflow:hidden;bottom:0;left:0;right:0;z-index:50;background:var(--ink);display:flex;max-width:480px;margin:0 auto;border-radius:14px 14px 0 0;padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;background:none;border:none;color:#a89e8c;padding:11px 4px 9px;font-size:11px;font-weight:600;display:flex;flex-direction:column;gap:3px;align-items:center;letter-spacing:.04em}
nav button .ico{font-size:19px}
nav button.active{color:var(--cream)}
nav button.active .ico{transform:translateY(-1px)}
nav button:focus-visible,.btn:focus-visible,.choice:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
</style>

const TOPICS=[{"p":1,"code":"1.2","name":"Native American Societies Before European Contact","study":["The spread of <b>maize cultivation</b> from present-day Mexico supported economic development, permanent settlement, irrigation, and social diversification in the Southwest (<b>Pueblo</b> peoples).","The <b>Great Basin</b> and Great Plains supported mobile lifestyles organized around hunting and gathering; horses (later) transformed Plains life.","The Northeast (<b>Iroquois</b>), Atlantic seaboard, and Mississippi Valley (<b>Cahokia</b>) developed farming, hunting, and permanent villages; the Pacific Northwest built wealthy fishing societies.","Key claim: pre-contact North America held hundreds of distinct, complex societies shaped by <b>environmental adaptation</b> — not one uniform culture."],"qs":[{"q":"The spread of maize cultivation northward from Mexico most directly supported","ch":["settled agriculture, irrigation, and social diversification","the rapid spread of horse-based hunting across the Great Plains","a single unified continental religion","the abandonment of long-distance trade in favor of local self-sufficiency"],"ex":"Maize enabled permanent, complex societies — the CED's signature Period 1 development.","kc":"Native societies grew complex by adapting to and transforming diverse environments."},{"q":"Which pairing of region and lifeway is accurate for pre-contact North America?","ch":["Great Basin: mobile hunter-gatherer bands","Southwest: whaling-based ocean economies","Pacific Northwest: nomadic buffalo hunting","Northeast: desert irrigation and adobe towns"],"ex":"The arid Great Basin supported mobility; the other pairings scramble regions.","kc":"Environment shaped diverse Native social organization across regions."}]},{"p":1,"code":"1.3","name":"European Exploration in the Americas","study":["European states sought <b>new trade routes</b> to Asia, wealth, and national power; Portugal pioneered an African sea route while Spain sponsored trans-Atlantic voyages.","Motives mixed <b>gold, God, and glory</b>: profit, converting non-Christians, and competition among rising centralized monarchies.","New technology enabled voyages: the <b>caravel</b>, improved <b>astrolabe</b> and compass (borrowed via Islamic and Asian contact), and joint financing.","The <b>Treaty of Tordesillas</b> (1494) divided New World claims between Spain and Portugal."],"qs":[{"q":"A primary motive for 15th–16th century European exploration was","ch":["gaining direct access to Asian trade goods and new sources of wealth","escaping religious uniformity at home","establishing democratic settler colonies with elected local assemblies","ending the Atlantic slave trade"],"ex":"Cutting out middlemen in the Asia trade drove the search for sea routes.","kc":"Economic competition among centralizing monarchies launched exploration."},{"q":"Maritime advances like the caravel and astrolabe are best used as evidence that","ch":["technological diffusion made Atlantic exploration possible","Europeans developed navigation independently of Mediterranean and Islamic learning","Atlantic sailing depended on state monopolies rather than new instruments","Portuguese voyages had already reached the Caribbean before 1400"],"ex":"Borrowed and improved technologies unlocked open-ocean sailing.","kc":"Cross-cultural exchange of technology enabled European expansion."}]},{"p":1,"code":"1.4","name":"Columbian Exchange, Spanish Exploration, and Conquest","study":["The <b>Columbian Exchange</b> moved crops, animals, people, microbes, and ideas across the Atlantic, permanently remaking both hemispheres.","Old World <b>disease</b> (especially smallpox) killed a majority of Native peoples in many regions; American crops (maize, potatoes) fueled European population growth.","American <b>gold and silver</b> enriched Spain, shifted Europe toward <b>capitalism</b>, and funded conquest — Cortés toppled the Aztecs (1521), Pizarro the Inca.","New financial tools like <b>joint-stock companies</b> spread the risk of colonization."],"qs":[{"q":"The most significant demographic effect of the Columbian Exchange in the Americas was","ch":["catastrophic Native population decline from Old World disease","rapid growth of Native populations from new livestock","a mass voluntary migration of European farm families before 1550","the disappearance of maize as a staple crop"],"ex":"Epidemics were the defining demographic fact of the encounter.","kc":"The Exchange devastated the Americas demographically while enriching European diets and economies."},{"q":"The excerpt best reflects which motive for Spanish colonization?","st":{"t":"\"We came here to serve God and His Majesty, to give light to those who were in darkness, and to grow rich, as all men desire to do.\"","s":"Bernal Díaz del Castillo, conquistador, on the conquest of Mexico"},"ch":["The fusion of religious conversion with the pursuit of wealth","A purely humanitarian mission without economic aims","A plan for trade with Natives as equal partners","The desire to plant representative government abroad in new lands"],"ex":"God, king, and riches in one breath — the classic Spanish blend.","kc":"Spanish colonization mixed religious, political, and economic goals."}]},{"p":1,"code":"1.5","name":"Labor, Slavery, and Caste in the Spanish Colonial System","study":["The <b>encomienda system</b> granted colonists Native labor and tribute; as Native populations collapsed, Spain increasingly imported enslaved <b>Africans</b>.","Spain built extractive economies on <b>silver mining</b> (Potosí) and plantation agriculture.","The <b>casta system</b> ranked colonial society by ancestry — peninsulares, creoles, <b>mestizos</b>, Natives, Africans — writing race into law and status.","Widespread intermarriage (from a mostly male migration) produced large mixed-ancestry populations unlike later English patterns."],"qs":[{"q":"The encomienda system is best described as","ch":["a grant of Native labor and tribute to Spanish colonists","free land distributed to Native families by the Spanish crown","wage labor negotiated by Native leaders","a network of independent trading posts"],"ex":"Coerced labor dressed in duties of \"protection\" and conversion.","kc":"Spain relied on coerced Native and African labor to extract wealth."},{"q":"The casta system is the strongest evidence that Spanish colonial society","ch":["was legally organized around racial ancestry","granted equal legal standing to all baptized subjects of the crown","placed Native peoples atop the hierarchy of status","assigned status by wealth and landholding rather than ancestry"],"ex":"Legal status tracked ancestry from peninsulares down.","kc":"Spanish colonization created a hierarchical, race-based social order."}]},{"p":1,"code":"1.6","name":"Cultural Interactions in the Americas","study":["Europeans and Natives met through trade, alliance, missionary work, and violence; both sides <b>adapted</b> — Natives adopted horses and metal tools, Europeans adopted crops and local knowledge.","Spaniards imposed labor systems and <b>Christianity</b> through missions; Native peoples blended, adapted, or rejected these impositions and defended <b>autonomy</b>.","Europeans debated the treatment of Native peoples — <b>Las Casas</b> condemned abuses against <b>Sepúlveda</b>'s defense of conquest (Valladolid, 1550–51).","Ideas of European religious and cultural <b>superiority</b> were used to justify seizing land and labor; Natives resisted through warfare and diplomacy."],"qs":[{"q":"The Valladolid debate centered on","ch":["whether Native peoples could justly be subjugated and how they should be treated","whether Spain should abandon the Americas and return its colonies to Native rule","Portugal's share of American territory","the price of American silver in Asia"],"ex":"The era's great argument over the humanity and treatment of Native peoples.","kc":"Europeans publicly debated the ethics of conquest — with real policy stakes."},{"q":"Plains peoples' adoption of the horse best illustrates","ch":["Native adaptation that transformed economies and warfare","the failure of Native societies to change after European contact","European refusal to trade animals","the end of buffalo hunting after contact"],"ex":"A Columbian Exchange arrival revolutionized Plains mobility and power.","kc":"Contact produced mutual adaptation, not one-way change."}]},{"p":2,"code":"2.2","name":"European Colonization","study":["<b>Spain</b> built extraction-and-conversion colonies incorporating (and subjugating) Natives; <b>France</b> and the <b>Dutch</b> built trade networks — especially <b>fur</b> — with alliances and relatively few settlers.","<b>England</b> sent large numbers of families and laborers seeking land and profit, pushing Natives off territory rather than incorporating them.","Colonial goals differed: gold and souls (Spain), trade posts (France/Netherlands), <b>settler agriculture</b> (England).","These different models produced lasting differences in Native relations, labor systems, and society."],"qs":[{"q":"French colonization in North America differed from English colonization mainly in its","ch":["reliance on fur-trade alliances with Native peoples rather than large-scale settlement","emphasis on family farming towns","rapid expulsion of Native peoples from trade networks and settlements along the St. Lawrence","refusal to engage in missionary activity"],"ex":"Few settlers plus fur profits meant alliance and intermarriage, not displacement.","kc":"European powers pursued distinct colonization models with distinct Native relations."},{"q":"English colonization was distinctive for","ch":["large migrations of families seeking land, displacing Native communities","incorporating Native peoples into colonial society through intermarriage","establishing colonies solely as military bases","avoiding agriculture in favor of mining"],"ex":"Land-hungry settler colonies pushed Natives out rather than absorbing them.","kc":"Settler colonialism defined the English pattern in North America."}]},{"p":2,"code":"2.3","name":"The Regions of British Colonies","study":["<b>New England</b>: Puritan families, towns and churches, small farms, commerce and shipping; the <b>Chesapeake</b> and North Carolina: <b>tobacco</b>, indentured servants, then enslaved labor.","The <b>Middle Colonies</b>: grain exports, striking ethnic and religious <b>diversity</b> (Quaker Pennsylvania); the <b>Southern Atlantic and West Indies</b>: rice and sugar plantations with enslaved majorities.","Most colonies developed elected assemblies (Virginia's <b>House of Burgesses</b>, 1619) and local self-rule under loose imperial oversight.","Geography and migration patterns drove each region's economy, labor system, and society."],"qs":[{"q":"Slavery became most entrenched in the southern colonies because","ch":["labor-intensive cash crops made coerced labor profitable","southern colonists uniquely opposed servitude on religious grounds","New England's climate favored tobacco","enslaved Africans were barred from southern ports"],"ex":"Tobacco, rice, and indigo demanded massive labor.","kc":"Regional economies produced regional labor systems."},{"q":"The excerpt reflects which feature of the Middle Colonies?","st":{"t":"\"The people are a collection of divers nations: French, Dutch, Germans, Swedes, and English; many are Quakers, Baptists, Lutherans, and Catholics, living quietly beside one another.\"","s":"Colonial observer on Pennsylvania, early 1700s"},"ch":["Unusual ethnic and religious pluralism","A single legally established church","An economy built on sugar plantations there","Exclusion of non-English migrants"],"ex":"Tolerance drew the most mixed population in British America.","kc":"The Middle Colonies were the most diverse region of British America."}]},{"p":2,"code":"2.4","name":"Transatlantic Trade","study":["Under <b>mercantilism</b>, colonies enriched the mother country; Parliament's <b>Navigation Acts</b> routed colonial trade through English ships and ports.","An <b>Atlantic economy</b> (triangular trade) linked New England shipping and rum, African captives, Caribbean sugar, and British manufactures.","Loose enforcement — <b>salutary neglect</b> — allowed smuggling and entrenched colonial <b>self-government</b>.","Port cities grew and an Anglo-American <b>consumer culture</b> spread British goods through every colony."],"qs":[{"q":"The Navigation Acts were designed to","ch":["channel colonial commerce to benefit England","open colonial ports to Dutch and French carriers on equal terms","encourage French investment in English colonies","shift the cost of colonial defense onto the chartered trading companies"],"ex":"Mercantilism in statute: colonial trade served the metropole.","kc":"Mercantilist policy treated colonies as raw-material sources and captive markets."},{"q":"\"Salutary neglect\" describes","ch":["lax British enforcement that let colonial autonomy flourish","Parliament's formal grant of independence to the American colonies","a colonial boycott of the West Indies","heavy garrisoning of colonial cities"],"ex":"Weak oversight taught colonists to expect self-rule — an expectation Britain later violated.","kc":"Decades of loose control built colonial habits of self-government."}]},{"p":2,"code":"2.5","name":"Interactions Between American Indians and Europeans","study":["English expansion brought recurring conflict: the Pequot War, <b>Metacom's (King Philip's) War</b> (1675–76) devastated New England and broke Native power there.","The <b>Pueblo Revolt</b> (1680) expelled the Spanish from New Mexico for over a decade — the era's most successful Native rising; Spain returned with more accommodation.","Natives and Europeans traded, allied, and played rival empires against each other while defending land and <b>sovereignty</b>.","Conflicts hardened boundaries and racial attitudes, especially in English colonies."],"qs":[{"q":"The Pueblo Revolt of 1680 resulted in","ch":["the expulsion of Spanish colonizers from New Mexico for more than a decade","the permanent end of Spanish colonization in North America and the Caribbean islands","an alliance between the Pueblo and the English","the immediate conversion of the Pueblo to Christianity"],"ex":"Popé's coordinated rising drove Spain out until the 1690s reconquest.","kc":"Native peoples mounted organized, sometimes successful resistance to colonization."},{"q":"Metacom's War (King Philip's War) is significant because it","ch":["broke the military power of Native peoples in New England","ended English settlement in Massachusetts for a generation","was resolved without significant violence","led England to abandon the fur trade"],"ex":"Proportionally among the bloodiest American wars; New England Native independence never recovered.","kc":"Expansion of settler colonies produced devastating wars over land."}]},{"p":2,"code":"2.6","name":"Slavery in the British Colonies","study":["All British colonies participated in the <b>Atlantic slave trade</b>; the <b>Middle Passage</b> carried hundreds of thousands into bondage under horrific conditions.","Late-1600s laws made slavery <b>chattel</b>: hereditary (through the mother), lifelong, and racial; <b>Bacon's Rebellion</b> (1676) sped the Chesapeake's shift from servants to slaves.","Enslaved people resisted covertly — slowed work, broken tools, preserved <b>culture</b>, family, and religion — and overtly, as in the <b>Stono Rebellion</b> (1739).","Rebellions were answered with harsher <b>slave codes</b>."],"qs":[{"q":"One major consequence of Bacon's Rebellion was that Chesapeake planters","ch":["increasingly replaced indentured servants with enslaved Africans","abolished the headright system","abandoned tobacco for wheat","granted former servants political equality and free land in the west"],"ex":"Fear of armed ex-servants pushed planters toward lifelong enslaved labor.","kc":"Bacon's Rebellion marks the pivot toward racialized chattel slavery."},{"q":"The excerpt shows which feature of colonial slave law?","st":{"t":"\"All children borne in this country shall be held bond or free only according to the condition of the mother.\"","s":"Virginia law, 1662"},"ch":["Slavery made hereditary through the mother's status","A promise of eventual freedom for enslaved children","A ban on importing enslaved Africans","Equal legal status for all children"],"ex":"Partus sequitur ventrem locked enslavement across generations.","kc":"Colonial statutes constructed slavery as permanent, inheritable, and racial."}]},{"p":2,"code":"2.7","name":"Colonial Society and Culture","study":["The <b>Enlightenment</b> spread ideas of natural rights, reason, and the social contract (<b>Locke</b>) through colonial print culture.","The <b>First Great Awakening</b> (1730s–40s): emotional revivals by <b>Edwards</b> and the touring <b>Whitefield</b> split churches (New Lights/Old Lights), founded colleges, and taught ordinary people to question authority.","An Anglo-American identity grew — British goods, rights, and institutions — alongside distinctly colonial habits of <b>self-rule</b>.","Both movements built the first shared <b>intercolonial culture</b>, kindling for later resistance."],"qs":[{"q":"A major political effect of the First Great Awakening was","ch":["encouraging colonists to challenge established authority","strengthening the authority of established colonial churches","concentrating religious life in the hands of university-trained clergy","discouraging the founding of new colleges and academies"],"ex":"If individuals could judge religious truth, they could judge political authority too.","kc":"The Awakening was the first mass movement to cross colonial boundaries."},{"q":"The excerpt is most characteristic of","st":{"t":"\"The God that holds you over the pit of hell, much as one holds a spider or some loathsome insect over the fire, abhors you.\"","s":"Jonathan Edwards, \"Sinners in the Hands of an Angry God,\" 1741"},"ch":["Great Awakening emotional revivalism","Enlightenment rationalism","mercantilist economic writing","Puritan legal codes of the 1630s and courts"],"ex":"Edwards's terror-and-grace preaching is the Awakening's most famous text.","kc":"Revivalists used emotional appeals to spark mass religious participation."}]},{"p":3,"code":"3.2","name":"The Seven Years' War (French and Indian War)","study":["Anglo-French rivalry over the <b>Ohio Valley</b> ignited war (1754–63); Britain won, expelling France from mainland North America (<b>Treaty of Paris, 1763</b>).","Victory doubled Britain's <b>debt</b>, ending salutary neglect and beginning direct taxation of the colonies.","Native peoples lost their ability to play empires against each other; <b>Pontiac's Rebellion</b> (1763) resisted British expansion.","The <b>Proclamation of 1763</b> barred settlement past the Appalachians — infuriating land-hungry colonists."],"qs":[{"q":"The French and Indian War led most directly to the imperial crisis because it","ch":["left Britain with debts it tried to pay by taxing the colonies","transfer Britain’s Ohio Valley claims to Spain under the peace terms","commit Britain to a permanent standing army only in the Caribbean","pushed the colonies toward alliance with Spain against Britain"],"ex":"War debt drove the taxes of the 1760s — the chain that leads to revolution.","kc":"1763 transformed British policy from neglect to control and taxation."},{"q":"Colonists resented the Proclamation of 1763 because it","ch":["closed western lands they had fought to open","imposed the first direct tax on printed goods","dissolved their colonial assemblies","required quartering troops in private homes"],"ex":"The settlement line seemed to steal the war's prize.","kc":"Western land hunger repeatedly collided with imperial policy."}]},{"p":3,"code":"3.3","name":"Taxation Without Representation","study":["Parliament taxed directly: <b>Sugar Act</b> (1764), <b>Stamp Act</b> (1765), <b>Townshend Acts</b> (1767) — colonists answered with boycotts, the Stamp Act Congress, and <b>\"no taxation without representation.\"</b>","Groups like the <b>Sons of Liberty</b> organized (sometimes violent) resistance; women's <b>Daughters of Liberty</b> made boycotts work with homespun cloth.","Escalation: the <b>Boston Massacre</b> (1770), <b>Boston Tea Party</b> (1773), and the punitive <b>Coercive (Intolerable) Acts</b> (1774).","<b>Committees of correspondence</b> and the First Continental Congress coordinated intercolonial resistance."],"qs":[{"q":"Colonial objections to the Stamp Act rested on the principle that","ch":["only colonial assemblies could tax colonists","all taxation was inherently tyrannical by nature","external trade taxes should be raised","internal taxes were acceptable only if the revenue stayed in the colonies"],"ex":"The issue was consent, not cost.","kc":"Resistance claimed traditional English rights within the empire."},{"q":"The excerpt best reflects the colonial position in 1765.","st":{"t":"\"We claim only the rights of Englishmen: that no part of our property shall be taken from us without our consent, given personally or by our representatives.\"","s":"Resolutions of the Stamp Act Congress, 1765"},"ch":["Resistance framed as defense of English constitutional rights","An immediate demand for independence","Rejection of representative government","Acceptance of Parliament's absolute power to tax the colonies"],"ex":"In 1765 colonists claimed rights within the empire — separation came later.","kc":"Early protest appealed to the British constitution, not revolution."}]},{"p":3,"code":"3.4","name":"Philosophical Foundations of the American Revolution","study":["<b>Enlightenment</b> ideas — Locke's <b>natural rights</b> and social contract, Montesquieu's separation of powers — supplied the intellectual case for resistance.","<b>Republicanism</b>: government resting on the consent of virtuous, independent citizens rather than hereditary rule.","Thomas Paine's <b>Common Sense</b> (Jan 1776) translated these ideas into a plain-language argument for independence that swept the colonies.","The <b>Declaration of Independence</b> (July 1776) grounded separation in unalienable rights and the consent of the governed."],"qs":[{"q":"Locke's ideas most directly shaped colonial thinking about","ch":["natural rights and government by consent","the divine right of kings","mercantilist trade regulation and tariffs","predestination in theology"],"ex":"Lockean rights and contract became the grammar of the Revolution.","kc":"Enlightenment philosophy became the official justification for independence."},{"q":"Paine's argument in the excerpt is best summarized as","st":{"t":"\"There is something very absurd in supposing a continent to be perpetually governed by an island... 'TIS TIME TO PART.\"","s":"Thomas Paine, Common Sense, 1776"},"ch":["Independence is both natural and necessary","The colonies should seek seats in Parliament","Monarchy is acceptable under a virtuous king","Reconciliation remains the wisest course"],"ex":"Paine made separation feel like common sense to a mass audience.","kc":"Common Sense moved public opinion decisively toward independence."}]},{"p":3,"code":"3.5","name":"The American Revolution","study":["Early survival under <b>Washington</b> (Trenton), then the turning point: <b>Saratoga</b> (1777) brought the <b>French alliance</b> — money, navy, troops.","The war was also civil war: <b>Loyalists</b>, Native nations, and enslaved people (many fleeing to British lines for promised freedom) made hard choices.","Victory at <b>Yorktown</b> (1781) with French help; the <b>Treaty of Paris (1783)</b> recognized independence to the Mississippi.","American advantages: home ground, cause, foreign aid; British burdens: distance, cost, an unwinnable countryside."],"qs":[{"q":"The Battle of Saratoga was a turning point primarily because it","ch":["persuaded France to openly ally with the United States","ended the war in the southern colonies and freed troops for the north","forced the British evacuation of Boston","gave the Continental Army control of New York City"],"ex":"Saratoga convinced Paris the cause could win.","kc":"Foreign alliance was decisive to American victory."},{"q":"For many enslaved people, the Revolutionary War represented","ch":["a chance to claim freedom, often by fleeing to British lines","a period of relative stability, since both armies avoided the plantations","emancipation granted by the Continental Congress in exchange for service","service confined entirely to labor battalions rather than combat"],"ex":"Dunmore's proclamation and wartime chaos opened paths to freedom for thousands.","kc":"The Revolution's meaning differed radically by who you were."}]},{"p":3,"code":"3.6","name":"The Influence of Revolutionary Ideals","study":["Revolutionary language of liberty exposed the contradiction of <b>slavery</b>: northern states began gradual emancipation; the South entrenched the institution.","<b>Republican motherhood</b> assigned women the civic role of raising virtuous citizens — expanding female education without political rights.","The Revolution inspired revolutions abroad — <b>France</b> (1789), <b>Haiti</b> (1791), Latin America.","State constitutions expanded suffrage and disestablished churches, testing how far equality would go."],"qs":[{"q":"\"Republican motherhood\" held that women should","ch":["raise virtuous, educated citizens for the republic","hold elected office in the states","petition Congress directly on questions of war and taxation","withdraw from religious and charitable associations"],"ex":"A civic (if domestic) role — and an argument for female education.","kc":"The Revolution changed gender expectations without granting political rights."},{"q":"One effect of Revolutionary ideals on slavery was that","ch":["northern states began gradual emancipation while the South entrenched slavery","slavery was abolished nationwide by 1790","the western territories were opened to slavery on equal terms with the seaboard","the international slave trade closed at once under the new Constitution"],"ex":"Liberty's logic split the sections — the contradiction deepened.","kc":"Revolutionary ideals had uneven, contested consequences."}]},{"p":3,"code":"3.7","name":"The Articles of Confederation","study":["The <b>Articles</b> created a weak league: no power to tax, no executive or national courts, unanimity for amendment.","Successes: winning the war and the <b>Northwest Ordinance</b> (1787) — orderly statehood and a slavery ban in the Northwest Territory.","Failures: unpaid debts, trade chaos, and <b>Shays' Rebellion</b> (1786–87), which the government could not suppress.","Elite alarm at this weakness produced the Philadelphia Convention."],"qs":[{"q":"Shays' Rebellion strengthened calls for a new constitution by showing that","ch":["the national government was too weak to keep order","state governments had grown too powerful and reckless","farmers backed the Articles unanimously","Britain was preparing to reinvade"],"ex":"A government that couldn't raise an army against debtor farmers had failed.","kc":"The Articles' weaknesses drove constitutional reform."},{"q":"The Northwest Ordinance is significant partly because it","ch":["set rules for statehood and banned slavery in the Northwest Territory","opened the territory to unlimited slavery and plantation agriculture there","was struck down by the Supreme Court","made the territory a permanent colony"],"ex":"A template for equal new states — and an early free/slave line.","kc":"Even the weak Confederation set precedents for anti-colonial expansion."}]},{"p":3,"code":"3.8","name":"The Constitutional Convention and Debates over Ratification","study":["Philadelphia (1787) compromised: the <b>Great Compromise</b> (House by population, Senate by state) and the <b>Three-Fifths Compromise</b> counting enslaved people for representation.","The slave trade was protected for twenty years; a <b>fugitive slave clause</b> was included — slavery shaped the document without being named.","<b>Federalists</b> (Hamilton, Madison, Jay — <b>The Federalist Papers</b>) argued a large republic would check faction; <b>Anti-Federalists</b> feared distant power and demanded a <b>Bill of Rights</b>.","Ratification succeeded with the promise of amendments — the Bill of Rights (1791)."],"qs":[{"q":"The Great Compromise resolved the large-state/small-state dispute by","ch":["pairing a population-based House with an equal-vote Senate","abolishing the state governments","letting the president set representation for each new state","counting only property owners"],"ex":"Bicameralism split the Virginia and New Jersey plans' difference.","kc":"The Constitution was built from negotiated compromise."},{"q":"Anti-Federalists' most effective demand during ratification was for","ch":["a bill of rights protecting individual liberties","an immediate second revolution against the new government","abolition of the presidency","a return to British rule"],"ex":"Their price for ratification became the first ten amendments.","kc":"Ratification debates turned on fears of centralized power."}]},{"p":3,"code":"3.9","name":"The Constitution","study":["<b>Federalism</b> divided power between nation and states; <b>separation of powers</b> split it among branches with <b>checks and balances</b>.","The <b>elastic (necessary and proper) clause</b> left room for implied powers — the future battleground of strict vs. loose construction.","The <b>Bill of Rights</b> (1791) protected speech, press, religion, and due process against federal power.","Amendment procedures let the framework change — slowly and by supermajority."],"qs":[{"q":"\"Checks and balances\" refers to","ch":["each branch's power to limit the others","the division of power between nation and states","judicial review of state laws only","the balance between the two houses of Congress"],"ex":"Veto, override, appointment, impeachment — mutual restraint by design.","kc":"The Constitution fragments power to prevent tyranny."},{"q":"The author of the excerpt would most likely support which position?","st":{"t":"\"The powers delegated by the proposed Constitution to the federal government are few and defined. Those which are to remain in the State governments are numerous and indefinite.\"","s":"James Madison, The Federalist No. 45, 1788"},"ch":["Ratification, reassuring readers that states retain broad power","Rejection of the Constitution as consolidation of federal power","An immediate second convention","Abolishing state governments"],"ex":"Madison calms consolidation fears to win ratification.","kc":"The federal–state balance was the ratification fight's core question."}]},{"p":3,"code":"3.10","name":"Shaping a New Republic","study":["Washington set <b>precedents</b> (cabinet, two terms); Hamilton's <b>financial plan</b> — debt assumption, a <b>national bank</b>, tariffs — split the government into <b>Federalists</b> vs. <b>Democratic-Republicans</b>.","The <b>Whiskey Rebellion</b> (1794) was crushed, proving federal law could be enforced.","Foreign policy walked between Britain and revolutionary France: Neutrality Proclamation, Jay's and Pinckney's treaties; Adams weathered the XYZ Affair and Quasi-War.","The <b>Alien and Sedition Acts</b> punished dissent; the <b>Virginia and Kentucky Resolutions</b> answered with state challenges to federal law. Washington's <b>Farewell Address</b> warned against parties and permanent alliances."],"qs":[{"q":"Hamilton justified the national bank by arguing that","ch":["the necessary and proper clause implies unlisted powers","the Tenth Amendment grants banking to Congress explicitly","war powers include chartering banks","the Constitution names a bank explicitly"],"ex":"Loose construction via implied powers — the founding constitutional debate.","kc":"The bank fight defined strict vs. loose interpretation."},{"q":"The excerpt reflects which of Washington's warnings?","st":{"t":"\"The spirit of party... agitates the community with ill-founded jealousies and false alarms; kindles the animosity of one part against another.\"","s":"George Washington, Farewell Address, 1796"},"ch":["Political factions endanger national unity","Foreign trade should be abandoned","A standing army guarantees liberty and peace","Presidents should serve for life"],"ex":"He feared parties would tear the republic apart even as they formed around him.","kc":"The Farewell Address warned against factionalism and permanent alliances."}]},{"p":3,"code":"3.11","name":"Developing an American Identity","study":["A new national culture grew through symbols, civic rituals, art (Peale, Stuart), and an American language (<b>Webster's</b> spellers and dictionary).","<b>Republican virtue</b> — independence, simplicity, civic duty — defined the ideal citizen.","Regional identities persisted (and diverged) beneath national symbols, especially over slavery.","Education expanded as a republican necessity: informed citizens for self-government."],"qs":[{"q":"Noah Webster's dictionaries and spellers aimed to","ch":["build a distinct American language and national identity","preserve British spelling in the colonies and schoolbooks","replace English with Latin in schools","discourage public education"],"ex":"\"American\" spelling was cultural independence in print.","kc":"The new nation deliberately constructed a national culture."},{"q":"In the early republic, education was promoted chiefly as","ch":["a necessity for self-governing republican citizens","a luxury for the wealthy alone","preparation for hereditary office among leading families","a purely religious obligation"],"ex":"Republics, the argument ran, survive only with informed citizens.","kc":"Republican ideology tied schooling to the survival of self-government."}]},{"p":3,"code":"3.12","name":"Movement in the Early Republic","study":["Settlers streamed over the Appalachians; new states (Kentucky, Tennessee, Ohio) entered under Northwest Ordinance rules.","Migration brought relentless <b>conflict with Native nations</b> — Fallen Timbers (1794), the Treaty of Greenville — as the U.S. took the Ohio country.","The first <b>American frontier culture</b> formed: squatters, speculators, and evangelical circuit riders.","Regional interests over rivers (Mississippi access) and land shaped early national politics and diplomacy."],"qs":[{"q":"Westward migration in the 1790s most directly produced","ch":["armed conflict with Native nations over the Ohio country","the immediate abolition of slavery in new states and territories","a halt to land speculation","the closing of the Mississippi to Americans"],"ex":"Fallen Timbers and Greenville marked the violent opening of the Northwest.","kc":"Expansion and Native dispossession were joined from the republic's birth."},{"q":"Pinckney's Treaty (1795) mattered to western settlers because it","ch":["secured navigation of the Mississippi through New Orleans","ended Spanish claims to the Louisiana Territory","ceded Florida to the United States","committed Spain to a defensive alliance against Britain"],"ex":"River access made western farms economically viable.","kc":"Geography and market access drove frontier politics."}]},{"p":4,"code":"4.2","name":"The Rise of Political Parties and the Era of Jefferson","study":["The <b>\"Revolution of 1800\"</b>: power passed peacefully from Federalists to Jefferson's Democratic-Republicans.","Jefferson cut debt and the military but stretched the Constitution for the <b>Louisiana Purchase</b> (1803); <b>Lewis and Clark</b> mapped the new West.","The <b>Marshall Court</b> built national power: <b>Marbury v. Madison</b> (1803) established judicial review; McCulloch and Gibbons followed.","Trade wars (the failed <b>Embargo Act</b>) led to the <b>War of 1812</b>, which killed the Federalists (Hartford Convention) and fired nationalism."],"qs":[{"q":"Jefferson's Louisiana Purchase was ironic because it","ch":["required the loose constitutional reading he had opposed","shrank land available for farmers","violated his support for a national bank and internal taxes","was blocked by his own party"],"ex":"The strict constructionist found no purchase clause — and bought anyway.","kc":"Governing repeatedly bent ideology in the early republic."},{"q":"Marbury v. Madison established","ch":["judicial review of federal laws","presidential removal power","state nullification of federal statutes","congressional control of the Court"],"ex":"Marshall claimed the power to strike down unconstitutional acts.","kc":"The Marshall Court made the judiciary a coequal, nationalizing branch."}]},{"p":4,"code":"4.3","name":"Politics and Regional Interests","study":["Clay's <b>American System</b> — tariff, national bank, internal improvements — aimed to bind regions into one national economy.","Regional interests hardened: northern manufacturing (pro-tariff), southern plantation exports (anti-tariff), western land and transport demands.","The <b>Missouri Compromise</b> (1820): Missouri slave, Maine free, slavery banned north of <b>36°30′</b> — postponing but exposing the sectional fault line.","Jefferson called the crisis \"a fire bell in the night.\""],"qs":[{"q":"The Missouri Compromise attempted to resolve sectional conflict by","ch":["pairing slave and free admissions and drawing a line at 36°30′","abolishing slavery in all territories","ending congressional power over territories and new admissions","organizing the Mexican Cession under popular sovereignty"],"ex":"Balance in the Senate plus a geographic line bought forty years of uneasy peace.","kc":"Every expansion decision reopened the slavery question."},{"q":"Southern planters generally opposed protective tariffs because tariffs","ch":["raised the cost of imports while inviting retaliation against cotton exports","lowered the price of enslaved labor while raising the value of southern land holdings","directed federal revenue toward internal improvements in the North","required southern states to fund northern manufacturing directly"],"ex":"An export economy paid the tariff's costs and reaped few benefits.","kc":"Economic geography drove sectional politics."}]},{"p":4,"code":"4.4","name":"America on the World Stage","study":["The <b>War of 1812</b> (impressment, western war hawks) ended in stalemate but bred nationalism — and Jackson's New Orleans fame.","Postwar diplomacy set borders with Britain and won <b>Florida</b> from Spain (Adams-Onís, 1819).","The <b>Monroe Doctrine</b> (1823) declared the hemisphere closed to new European colonization.","Foreign policy served expansion: security for trade, land, and the market revolution."],"qs":[{"q":"The excerpt announces which principle?","st":{"t":"\"The American continents... are henceforth not to be considered as subjects for future colonization by any European powers.\"","s":"President James Monroe, message to Congress, 1823"},"ch":["The hemisphere was closed to new European colonization","The U.S. would join European alliances to keep the peace","Latin America should rejoin Spain","The U.S. renounced Pacific interests"],"ex":"The Monroe Doctrine claimed hemispheric primacy.","kc":"Early foreign policy sought independence from Europe while asserting regional influence."},{"q":"A major domestic consequence of the War of 1812 was","ch":["a surge of nationalism and the collapse of the Federalist Party","the permanent loss of the Northwest Territory to British Canada","the abolition of the national bank","a formal alliance with Britain"],"ex":"Hartford Convention \"treason\" talk finished the Federalists.","kc":"War forged national identity and reshaped party politics."}]},{"p":4,"code":"4.5","name":"Market Revolution: Industrialization","study":["Transportation knit markets: the <b>Erie Canal</b> (1825), steamboats, turnpikes, then <b>railroads</b> and the telegraph.","Manufacturing rose: <b>interchangeable parts</b>, textile mills, the <b>Lowell system</b> of young female operatives.","The <b>cotton gin</b> made short-staple cotton profitable — binding southern slavery to northern factories and British mills.","Regions specialized: northern industry, western grain, southern <b>cotton</b> — interdependent yet diverging."],"qs":[{"q":"The cotton gin's most significant consequence was","ch":["making upland cotton profitable and entrenching slavery","ending plantation agriculture","moving cotton production to New England textile districts","reducing world demand for cotton"],"ex":"Cotton acreage — and demand for enslaved labor — exploded.","kc":"Technology tied the market revolution directly to slavery's expansion."},{"q":"The Erie Canal most directly contributed to","ch":["New York City's rise as the nation's leading port","the collapse of Great Lakes farming and lake shipping","routing western trade to Canada","a decline in westward migration"],"ex":"The canal made NYC the outlet of the Great Lakes interior.","kc":"Internal improvements reoriented western trade toward the Northeast."}]},{"p":4,"code":"4.6","name":"Market Revolution: Society and Culture","study":["Households shifted from <b>subsistence</b> to producing for cash markets and buying manufactured goods.","A new <b>middle class</b> emerged with the <b>cult of domesticity</b>: separate spheres, women as moral guardians of the home.","Waves of <b>Irish</b> (famine) and <b>German</b> immigrants filled cities and factories — meeting nativist hostility.","Wage labor bred early unions, strikes (Lowell), and class consciousness."],"qs":[{"q":"The excerpt best supports which conclusion?","st":{"t":"\"The farmer who once wove his own cloth now sells his wheat for cash and buys his coat from a store, made by hands he will never see.\"","s":"New England commentator, 1830s"},"ch":["Households shifted from self-sufficiency toward market production","Farmers abandoned agriculture entirely for factory work in the cities","Cash mattered less in rural life","Manufacturing stayed within the home"],"ex":"Producing for market, consuming from market — the era in one sentence.","kc":"The market revolution moved Americans into cash and consumer economies."},{"q":"The \"cult of domesticity\" prescribed that middle-class women","ch":["preside over the home as moral guardians","manage family businesses publicly downtown","vote in local elections","labor in factories alongside men"],"ex":"Separate spheres ideology defined the new middle class.","kc":"Economic change restructured gender roles and family life."}]},{"p":4,"code":"4.7","name":"Expanding Democracy","study":["States dropped <b>property requirements</b>: near-universal white male suffrage by the 1830s.","Mass politics arrived — conventions, campaigns, spoils — as participation soared.","Democratization was racial and gendered: free Black men lost the vote in several states even as white suffrage grew; women remained excluded.","The disputed 1824 election (\"<b>corrupt bargain</b>\") birthed the Jacksonian Democratic Party."],"qs":[{"q":"Jacksonian-era democratization primarily meant","ch":["eliminating property requirements for white men","extending the vote to women","enfranchising free Black men nationwide at once","replacing state legislatures with direct election of senators"],"ex":"Broader for white men — narrower, often, for everyone else.","kc":"Expansion and exclusion advanced together in Jacksonian democracy."},{"q":"The \"corrupt bargain\" of 1824 refers to the charge that","ch":["Clay delivered the House to Adams in exchange for secretary of state","Jackson bought electoral votes in the South with promises of federal jobs","the House of Representatives ignored the electoral count entirely","Jackson’s electors were disqualified in several states"],"ex":"The accusation fueled Jackson's 1828 landslide and a new party.","kc":"Contested elections drove the creation of mass political parties."}]},{"p":4,"code":"4.8","name":"Jackson and Federal Power","study":["The <b>Bank War</b>: Jackson vetoed the Second Bank's recharter as a rich man's monopoly, moving deposits to \"pet banks\" — helping trigger the <b>Panic of 1837</b>.","The <b>Nullification Crisis</b> (1832–33): South Carolina voided the tariff; Jackson threatened force; Clay compromised.","The <b>Indian Removal Act</b> (1830) and <b>Trail of Tears</b> proceeded despite <b>Worcester v. Georgia</b>.","Opponents of \"King Andrew\" organized the <b>Whig Party</b>."],"qs":[{"q":"The significance of Worcester v. Georgia is that","ch":["the Court sided with the Cherokee, but removal happened anyway","the Court ordered removal westward","Georgia won title to Cherokee land","judicial review was first established over the states in this case"],"ex":"A ruling without enforcement — law versus power.","kc":"The Trail of Tears shows the gap between Native legal rights and political reality."},{"q":"The excerpt reflects which position in the Nullification Crisis?","st":{"t":"\"The laws of the United States must be executed... Disunion by armed force is treason. Are you really ready to incur its guilt?\"","s":"President Andrew Jackson, Proclamation to South Carolina, 1832"},"ch":["Federal supremacy over state attempts to void national law","Support for nullification","A proposal to abolish tariffs and refund duties already collected","Endorsement of secession"],"ex":"The states'-rights slaveholder drew a hard line at disunion.","kc":"Nullification rehearsed the constitutional battle of the Civil War."}]},{"p":4,"code":"4.9","name":"The Development of an American Culture","study":["Writers built a national literature: <b>Irving</b>, Cooper, then the <b>transcendentalists</b> — Emerson's self-reliance, Thoreau's Walden and civil disobedience.","The <b>Hudson River School</b> painted the American landscape as national identity.","<b>Utopian communities</b> (Shakers, Oneida, Brook Farm) experimented with perfected societies.","Popular culture — penny press, minstrelsy (with its racism), lyceums — spread with literacy and cities."],"qs":[{"q":"Transcendentalists like Emerson and Thoreau emphasized","ch":["individual intuition, self-reliance, and nature over social conformity","strict adherence to Puritan doctrine","industrial progress as the highest good for the young republic to pursue","obedience to government in all cases"],"ex":"The movement made nonconformity a national literary creed.","kc":"A distinctly American romanticism challenged materialism and convention."},{"q":"Utopian communities of the era are best understood as","ch":["experiments in perfecting society, sharing reform-era optimism","profit-driven manufacturing ventures backed by eastern investors","government resettlement programs","movements to restore monarchy"],"ex":"Perfectionism took communal form at Oneida, Brook Farm, and elsewhere.","kc":"Reform optimism produced radical social experiments."}]},{"p":4,"code":"4.10","name":"The Second Great Awakening","study":["Revivals swept the nation (<b>Charles Finney</b>, camp meetings, the <b>burned-over district</b>), preaching salvation by choice and <b>perfectibility</b>.","The Awakening democratized religion — Methodists and Baptists boomed; women and African Americans took active roles.","New movements arose, including the <b>Mormons</b> (Joseph Smith), who fled persecution westward.","Perfectionism powered reform: if sin was a choice, drink, ignorance, and slavery could be fought."],"qs":[{"q":"The Second Great Awakening fueled reform through its emphasis on","ch":["human perfectibility and the duty to improve society","predestination and futility of works in gaining salvation","separating religion from public life","loyalty to established churches"],"ex":"Revival became reform: temperance, schools, abolition.","kc":"Evangelical perfectionism supplied antebellum reform's energy."},{"q":"Which development is evidence of the Awakening's democratizing effect?","ch":["rapid growth of Methodist and Baptist churches among ordinary people","a legally established national church","the decline of camp meetings","the consolidation of denominations under a single national conference"],"ex":"Emotional, accessible faiths outgrew the old establishments.","kc":"Religious authority shifted toward popular participation."}]},{"p":4,"code":"4.11","name":"An Age of Reform","study":["<b>Temperance</b> targeted alcohol; <b>Horace Mann</b> built common schools; <b>Dorothea Dix</b> reformed asylums and prisons.","<b>Abolitionism</b> radicalized: Garrison's <b>The Liberator</b> (immediatism), <b>Frederick Douglass</b>'s voice, the Underground Railroad — against fierce backlash North and South.","<b>Seneca Falls</b> (1848) launched women's rights with the <b>Declaration of Sentiments</b>.","Reformers shared evangelical roots and the language of the founding turned against national sins."],"qs":[{"q":"William Lloyd Garrison broke from earlier antislavery approaches by demanding","ch":["immediate, uncompensated emancipation","gradual emancipation with compensation","colonization in Africa only","a constitutional amendment protecting slavery"],"ex":"\"I will not retreat a single inch\" — immediatism.","kc":"Abolitionism split among gradualists, colonizationists, and immediatists."},{"q":"The excerpt deliberately echoes which document — and why?","st":{"t":"\"We hold these truths to be self-evident: that all men and women are created equal.\"","s":"Declaration of Sentiments, Seneca Falls, 1848"},"ch":["The Declaration of Independence, to claim its promises for women","The Constitution, to reform the judiciary","The Mayflower Compact, to found a colony","The Farewell Address, to warn against parties and party divisions"],"ex":"Stanton indicts the nation by its own creed.","kc":"Reformers wielded founding ideals against American practice."}]},{"p":4,"code":"4.12","name":"African Americans in the Early Republic","study":["Free Black communities grew in northern cities, building churches (<b>AME</b>, Richard Allen), schools, and mutual-aid societies amid discrimination.","Black abolitionists — <b>David Walker</b>'s Appeal, later Douglass — demanded immediate freedom and full citizenship.","Enslaved people resisted: everyday sabotage, escape, and revolt — <b>Nat Turner's Rebellion</b> (1831) terrified the South into harsher laws.","The <b>American Colonization Society</b> proposed African resettlement; most Black leaders rejected it as exile."],"qs":[{"q":"Nat Turner's Rebellion (1831) led southern states to","ch":["tighten slave codes and restrict Black literacy and assembly","begin gradual emancipation","expand manumission by will and by petition to the legislatures","abolish the domestic slave trade between the states within a decade"],"ex":"Fear answered revolt with repression.","kc":"Resistance met escalating legal control — a recurring pattern."},{"q":"Most Black leaders rejected the American Colonization Society because it","ch":["treated free African Americans as foreigners to be removed from their own country","demanded immediate abolition","was run entirely by abolitionists who demanded immediate and uncompensated emancipation","proposed compensating enslavers with federal funds before emancipation"],"ex":"\"This is our home\" — the claim of birthright citizenship.","kc":"Free Black communities asserted an American identity and citizenship."}]},{"p":4,"code":"4.13","name":"The Society of the South in the Early Republic","study":["<b>King Cotton</b> spread the plantation system into the Deep South; the internal <b>domestic slave trade</b> forcibly moved a million people, breaking families.","Most white southerners owned no slaves; a planter <b>elite</b> dominated politics and defined social aspiration.","Defenses of slavery hardened from \"necessary evil\" into a \"<b>positive good</b>\" ideology (Calhoun).","Enslaved communities sustained family, religion, and culture as resistance and survival."],"qs":[{"q":"The domestic slave trade after 1808 primarily involved","ch":["forced migration of enslaved people from the Upper South to cotton states","importation from Africa on a new scale","voluntary labor contracts westward","the movement of free Black workers north to factory jobs in growing industrial cities"],"ex":"A million people \"sold down the river\" as cotton moved southwest.","kc":"Slavery's expansion was an internal forced migration of vast scale."},{"q":"By the 1830s, southern defenders increasingly described slavery as","ch":["a \"positive good\" benefiting both races","a temporary evil to end soon on its own","a purely economic accident","contrary to scripture"],"ex":"Calhoun's formulation replaced apologetics with celebration.","kc":"Proslavery ideology hardened as abolitionism rose."}]},{"p":5,"code":"5.2","name":"Manifest Destiny","study":["<b>Manifest Destiny</b>: continental expansion as providential right — fusing nationalism, racial ideology, and land hunger.","Migrants moved down the <b>Oregon Trail</b>; \"Fifty-four forty or fight\" ended in the 1846 Oregon compromise at the 49th parallel.","Americans in Mexican <b>Texas</b> won independence (1836); annexation (1845) set up war with Mexico.","Expansion promised opportunity — and guaranteed conflict over slavery's spread."],"qs":[{"q":"The excerpt expresses which ideology?","st":{"t":"\"It is our manifest destiny to overspread the continent allotted by Providence for the free development of our yearly multiplying millions.\"","s":"John L. O'Sullivan, 1845"},"ch":["Divinely sanctioned continental expansion","Strict isolation within existing borders only","Opposition to annexing Texas","Support for returning land to Mexico"],"ex":"\"Allotted by Providence\" is the tell.","kc":"Expansion was framed as inevitable and righteous — at others' expense."},{"q":"Texas annexation was delayed for nearly a decade mainly because","ch":["adding a large slave state threatened sectional balance","Texas rejected American offers","the Constitution barred annexation of independent republics","Britain occupied the territory"],"ex":"Slavery politics, not geography, held Texas at the door.","kc":"Every acquisition reopened the slavery question."}]},{"p":5,"code":"5.3","name":"The Mexican–American War","study":["<b>Polk</b> pressed a disputed border (Nueces vs. Rio Grande) into war (1846–48); critics like Lincoln and Thoreau called it a war for slavery's expansion.","The <b>Treaty of Guadalupe Hidalgo</b> (1848) took the <b>Mexican Cession</b> — California and the Southwest — for $15 million.","The <b>Wilmot Proviso</b> (ban slavery in acquired lands) failed but split Congress by section, not party.","The <b>Gold Rush</b> (1849) flooded California and forced the statehood crisis."],"qs":[{"q":"The Wilmot Proviso is significant because it","ch":["revealed a sectional split over slavery's expansion cutting across party lines","became law for the Mexican Cession","settled the territorial slavery debate by extending the Missouri line to the Pacific","guaranteed slavery in California"],"ex":"The vote pattern — North vs. South — previewed realignment.","kc":"The war's spoils detonated the sectional crisis."},{"q":"A significant result of the California Gold Rush was","ch":["population growth that made statehood an urgent national question","a long delay in California's admission","the decline of overland migration","the removal of the slavery issue from politics for an entire generation"],"ex":"Forty-Niners forced the question that produced the Compromise of 1850.","kc":"Sudden western growth kept forcing the slavery question forward."}]},{"p":5,"code":"5.4","name":"The Compromise of 1850","study":["Clay's package: <b>California free</b>, popular sovereignty in Utah/New Mexico, the slave trade (not slavery) ended in D.C. — and a harsh new <b>Fugitive Slave Act</b>.","The Fugitive Slave Act conscripted northern officials and citizens into slavery's enforcement, radicalizing the North.","<b>Uncle Tom's Cabin</b> (1852) turned northern hearts; the South saw slander.","The \"final settlement\" lasted four years."],"qs":[{"q":"The Fugitive Slave Act of 1850 intensified conflict because it","ch":["forced northern citizens and officials to help capture escapees","banned slavery in new territories","applied only to escapees who had reached Canada","applied only to states admitted after 1820 under the compromise"],"ex":"It nationalized slavery's enforcement into northern towns.","kc":"Compromise measures deepened the crisis they meant to calm."},{"q":"In the Compromise of 1850, California","ch":["entered as a free state, tilting the Senate balance","entered as a slave state","was divided at 36°30′","remained a territory for a decade under military rule"],"ex":"Free California was the North's prize; the Fugitive Slave Act was the price.","kc":"The compromise traded sectional victories neither side fully accepted."}]},{"p":5,"code":"5.5","name":"Sectional Conflict: Regional Differences","study":["The North: industry, wage labor, railroads, immigration (<b>Irish, German</b>) — and nativist reaction (<b>Know-Nothings</b>).","The South: cotton and slavery, few cities, a planter elite ruling a majority of non-slaveholding whites.","<b>Free-soil ideology</b> opposed slavery's expansion (often to reserve land for free white labor); proslavery ideology answered with \"positive good.\"","Two economies, two labor systems, two visions of the future — one federal government."],"qs":[{"q":"The Know-Nothing (American) Party organized primarily around","ch":["opposition to immigrants, especially Catholics","support for immediate abolition","free trade with Britain","expansion of the franchise to women in the cities"],"ex":"Nativism briefly became a national party as old parties collapsed.","kc":"Immigration and slavery together shattered the second party system."},{"q":"Free-soil ideology held that","ch":["slavery should be barred from the territories, preserving them for free labor","slavery should be abolished immediately everywhere including the southern states","popular sovereignty should decide every territory","the slave trade should reopen"],"ex":"Not always abolitionist — but firmly against slavery's spread.","kc":"The territorial question, not abolition, organized northern politics."}]},{"p":5,"code":"5.6","name":"Failure of Compromise","study":["The <b>Kansas-Nebraska Act</b> (1854) repealed the Missouri line for popular sovereignty — igniting <b>Bleeding Kansas</b> and birthing the <b>Republican Party</b>.","<b>Dred Scott</b> (1857): Black Americans not citizens; Congress powerless over territorial slavery — voiding the Republican platform.","The <b>Lincoln-Douglas debates</b> (1858) made Lincoln a national figure; violence reached the Senate floor (Sumner caning).","Each \"solution\" accelerated the collision."],"qs":[{"q":"The Kansas-Nebraska Act outraged the North because it","ch":["repealed the Missouri Compromise ban north of 36°30′","admitted Kansas as a slave state at once without a vote","abolished popular sovereignty","organized the Utah and New Mexico territories under federal supervision"],"ex":"Land long promised to freedom was reopened — and the Republican Party was born.","kc":"Popular sovereignty produced fraud, violence, and polarization."},{"q":"In Dred Scott, the Taney Court held that","ch":["Black Americans were not citizens and Congress could not bar territorial slavery","enslaved people were freed by entering free states or any federal territory or port","the Missouri Compromise was binding","Congress alone decided slavery everywhere"],"ex":"The decision convinced many the \"Slave Power\" controlled the Court.","kc":"Dred Scott destroyed the constitutional middle ground."}]},{"p":5,"code":"5.7","name":"Election of 1860 and Secession","study":["<b>John Brown's raid</b> on Harpers Ferry (1859) — martyr North, terrorist South — hardened both sections.","The Democrats split; <b>Lincoln</b> won in 1860 on stopping slavery's expansion, without a single southern
