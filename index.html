{p:7,prompt:'Evaluate the extent to which the New Deal transformed the role of the federal government in American life in the period 1929\u20131945.',
groups:[null,'Expansion of federal responsibility','Opposition & constitutional limits','Limits of change & continuities'],
docs:[
{id:1,attr:'Franklin D. Roosevelt, First Inaugural Address, 1933',txt:'This Nation asks for action, and action now. Our greatest primary task is to put people to work\u2026 It can be accomplished in part by direct recruiting by the Government itself, treating the task as we would treat the emergency of a war.',grp:1,hipp:'A new president claiming wartime-scale authority for an economic emergency \u2014 the New Deal\u2019s premise in one sentence.'},
{id:2,attr:'Preamble of the Social Security Act, 1935',txt:'An Act to provide for the general welfare by establishing a system of Federal old-age benefits, and by enabling the several States to make more adequate provision for aged persons, dependent children, and unemployment compensation.',grp:1,hipp:'Statutory language making economic security a permanent federal responsibility \u2014 the welfare state\u2019s founding text.'},
{id:3,attr:'Adapted from a speech of a Liberty League spokesman, 1936',txt:'This administration has substituted the whims of bureaus for the rule of law. It taxes thrift to subsidize idleness, and calls regimentation recovery. The Constitution was not suspended by the Depression.',grp:2,hipp:'Business conservatives organizing against the New Deal \u2014 constitutional language deployed in defense of property.'},
{id:4,attr:'Adapted from the Supreme Court\u2019s reasoning in Schechter Poultry Corp. v. United States, 1935',txt:'Extraordinary conditions do not create or enlarge constitutional power. Congress cannot delegate its legislative authority to the Executive, nor reach transactions that are not interstate commerce.',grp:2,hipp:'The Court striking down the NRA \u2014 the constitutional ceiling the early New Deal kept hitting.'},
{id:5,attr:'Unemployment data, U.S. Bureau of Labor statistics (adapted)',txt:'Unemployment rate:<br>1933 \u2014 about 25%<br>1937 \u2014 about 14%<br>1939 \u2014 about 17%<br>1944 \u2014 about 1%',grp:3,hipp:'The numbers show partial recovery, relapse in 1937, and full employment only with war production \u2014 measuring the New Deal\u2019s limits.'},
{id:6,attr:'Adapted from a historian\u2019s assessment of the New Deal (secondary source)',txt:'Much that seemed revolutionary in 1933 had been rehearsed for a generation: the regulatory commissions, the labor standards, the social insurance schemes of the Progressives. Roosevelt nationalized an existing reform tradition.',grp:3,hipp:'A scholar arguing continuity \u2014 the New Deal as the Progressive era\u2019s heir rather than a clean break.'},{id:7,attr:'Union membership in the United States, adapted from federal labor statistics',txt:'Federal labor statistics on union membership across the New Deal years.',grp:1,hipp:'Routine government statistics — they measure whether a change in federal law actually shifted power on the shop floor.',viz:{t:'Union membership (millions)',rows:[['1933',29,'about 2.9'],['1937',72,'about 7.2'],['1940',87,'about 8.7'],['1945',143,'about 14.3']],note:'The Wagner Act became law in 1935.'}}],
hipp:[
{d:0,q:'The rhetorical strategy of Document 1 is best described as',ch:['framing the Depression as a war requiring government mobilization','promising to shrink federal power once markets recovered','blaming state governments for the economic collapse','announcing strict adherence to balanced budgets'],ex:'War language licensed emergency power \u2014 direct federal hiring \u201cas we would treat\u2026 war.\u201d'},
{d:1,q:'Document 2 marks a turning point because it',ch:['made economic security a permanent federal obligation in statute','created the first temporary relief program of the 1930s','transferred welfare responsibility entirely to the states','was repealed before any benefits were ever paid'],ex:'Not emergency relief but a standing system \u2014 the welfare state in law.'},
{d:2,q:'The point of view of Document 3 most shapes it in that the speaker represents',ch:['business conservatives casting the New Deal as lawless regimentation','labor organizers demanding faster and bolder reforms','farm groups seeking larger federal crop subsidies','New Dealers defending the administration\u2019s record'],ex:'The Liberty League spoke for property \u2014 constitutional rhetoric in defense of economic interest.'},
{d:3,q:'Document 4 explains which feature of the mid-1930s?',ch:['the constitutional collisions that provoked the court-packing fight','the Supreme Court\u2019s consistent approval of New Deal laws','the abolition of judicial review during the emergency','congressional refusal to delegate any authority'],ex:'Schechter and its kin struck down early programs \u2014 leading straight to 1937\u2019s confrontation.'},
{d:4,q:'Document 5 best supports which conclusion?',ch:['full recovery came with war production, not the New Deal alone','the Depression had ended completely by 1937','unemployment rose continuously throughout the 1930s','New Deal programs had no effect on joblessness'],ex:'The 1944 figure tells the ending \u2014 war spending finished what reform began.'},
{d:5,q:'Document 6 complicates a \u201crevolutionary\u201d reading of the New Deal by arguing that it',ch:['nationalized a reform tradition the Progressives had already built','invented federal regulation without any precedent','abandoned the goals of earlier reform movements','was designed primarily by business leaders'],ex:'Continuity thesis \u2014 commissions, standards, and insurance had Progressive rehearsals.'}]},

{id:1,attr:'Brown v. Board of Education, 1954',txt:'We conclude that in the field of public education the doctrine of \u201cseparate but equal\u201d has no place. Separate educational facilities are inherently unequal.',grp:1,hipp:'A unanimous Court reversing Plessy \u2014 the legal keystone of Jim Crow cracked by the NAACP\u2019s long campaign.'},
{id:2,attr:'Civil Rights Act of 1964, Title II',txt:'All persons shall be entitled to the full and equal enjoyment of the goods, services, facilities, and accommodations of any place of public accommodation, without discrimination on the ground of race, color, religion, or national origin.',grp:1,hipp:'Federal statute reaching private businesses \u2014 the movement\u2019s pressure converted into enforceable law.'},
{id:3,attr:'Adapted from training notes prepared for sit-in volunteers, 1960',txt:'Do not strike back nor curse if abused. Remember: we are not trying to defeat the man across the counter, but the system behind him. Your discipline is the argument.',grp:2,hipp:'Movement pedagogy \u2014 nonviolence as trained strategy, designed to make injustice visible and the protester unimpeachable.'},
{id:4,attr:'Adapted from testimony of a Mississippi sharecropper on attempting to register to vote, 1964',txt:'The day after I went to the courthouse, the man I worked for told me to take my name off the book or take my family off his land. I had lived there eighteen years.',grp:2,hipp:'Grassroots testimony showing what registration cost \u2014 economic terror as the enforcement arm of disenfranchisement.'},
{id:5,attr:'Report of the National Advisory Commission on Civil Disorders (Kerner Commission), 1968',txt:'Our nation is moving toward two societies, one black, one white \u2014 separate and unequal\u2026 Discrimination and segregation have long permeated much of American life; they now threaten the future of every American.',grp:3,hipp:'A presidential commission concluding, after the great laws had passed, that the deeper structures remained \u2014 the movement\u2019s unfinished half.'},
{id:6,attr:'Adapted from an account of housing discrimination in a northern city, 1966',txt:'The ordinance says nothing, and the deed says nothing, but the broker will not show the house, the bank will not write the loan, and the neighbors\u2019 association explains, politely, that we would be happier elsewhere.',grp:3,hipp:'De facto segregation without a statute to strike down \u2014 the northern problem that legal victories did not reach.'},{id:7,attr:'Black voter registration in the eleven southern states, adapted from federal and state records',txt:'Registration figures gathered across the eleven states of the former Confederacy.',grp:1,hipp:'Administrative records rather than movement publicity — they let you separate what changed on paper from what changed at the courthouse door.',viz:{t:'Black adults registered to vote, South',rows:[['1940',3,'about 3%'],['1960',29,'about 29%'],['1964',43,'about 43%'],['1969',62,'about 62%']],note:'The Voting Rights Act passed in 1965.'}}],

{d:1,q:'Document 2 extended federal power by',ch:['reaching discrimination by private businesses open to the public','desegregating only facilities owned by the government','transferring civil rights enforcement to the states','creating the first constitutional amendment on race'],ex:'Title II reached lunch counters and motels \u2014 private commerce under federal law.'},
{d:2,q:'The purpose of Document 3 is best described as',ch:['training protesters to make discipline itself the argument','recruiting participants for armed self-defense units','instructing lawyers preparing courtroom challenges','organizing a boycott of segregated businesses'],ex:'Nonviolence was rehearsed, not improvised \u2014 the notes script the confrontation\u2019s meaning.'},
{d:3,q:'Document 4 best explains why',ch:['federal enforcement was necessary to make voting rights real','literacy tests were the only barrier to registration','southern registration rose steadily without federal action','economic pressure played little role in disenfranchisement'],ex:'Eviction as punishment for registering \u2014 terror that only outside power could break.'},
{d:4,q:'The situation of Document 5 \u2014 published in 1968 \u2014 matters because it appeared',ch:['after the great legislative victories, measuring what they had not reached','before any federal civil rights laws had been enacted','during Reconstruction\u2019s original constitutional debates','as a campaign document for the 1964 election'],ex:'Post-1965 diagnosis: the laws passed, the deeper divide remained.'},

{id:1,attr:'President Ronald Reagan, speech at the Brandenburg Gate, 1987',txt:'General Secretary Gorbachev, if you seek peace, if you seek prosperity for the Soviet Union and Eastern Europe, if you seek liberalization: Come here to this gate! Mr. Gorbachev, open this gate! Mr. Gorbachev, tear down this wall!',grp:1,hipp:'Confrontation staged at the wall itself \u2014 a president speaking past Gorbachev to the world, two years before the wall fell.'},
{id:2,attr:'President George H. W. Bush, address to Congress, 1991',txt:'Out of these troubled times, a new world order can emerge: a new era \u2014 freer from the threat of terror, stronger in the pursuit of justice\u2026 in which the nations of the world can prosper and live in harmony.',grp:1,hipp:'Victory\u2019s vocabulary \u2014 the Gulf War coalition presented as the model for American-led order after the Soviet collapse.'},
{id:3,attr:'Adapted from an opinion column on the \u201cpeace dividend,\u201d 1992',txt:'The enemy has resigned, yet the budget has not noticed. If the Cold War is truly over, let the savings rebuild the schools and bridges at home \u2014 or we shall have won the world and mislaid the country.',grp:2,hipp:'A domestic argument about what victory should purchase \u2014 evidence that primacy\u2019s purpose was contested at home.'},
{id:4,attr:'Adapted from a commentary on globalization after NAFTA, 1994',txt:'The container ship has replaced the missile as the vessel of American power. But the same treaties that open markets abroad close factories in Ohio, and no one has yet told the workers where they fit in the new order.',grp:2,hipp:'Trade as the new instrument of influence \u2014 and the domestic dislocations that came bundled with it.'},
{id:5,attr:'Defense expenditure data (adapted)',txt:'U.S. military spending:<br>1985 \u2014 about $580 billion (2011 dollars)<br>1999 \u2014 about $400 billion (2011 dollars), still larger than the next several nations combined',grp:3,hipp:'The budget fell \u2014 and remained the world\u2019s largest by far. Numbers measuring continuity beneath the \u201cdividend.\u201d'},
{id:6,attr:'Adapted from a historian\u2019s assessment of post\u2013Cold War policy (secondary source)',txt:'The adversary vanished; the architecture did not. The alliances, the bases, the carrier groups, the global commitments \u2014 all outlived the rivalry that justified them, awaiting a new mission that September 2001 would supply.',grp:3,hipp:'A continuity argument \u2014 the machinery of the Cold War persisted, mission pending.'},{id:7,attr:'United States active-duty military personnel, adapted from Department of Defense figures',txt:'Department of Defense personnel figures spanning the end of the Cold War.',grp:2,hipp:'The Pentagon’s own count — a concrete test of whether the “peace dividend” was real or rhetorical.',viz:{t:'Active-duty military personnel (millions)',rows:[['1987',217,'about 2.17'],['1993',170,'about 1.70'],['1997',144,'about 1.44'],['2001',138,'about 1.38']],note:'Reductions followed the collapse of the Soviet Union in 1991.'}}],

let DB=null;
function dbqDocBox(d,n){return '<div class="stimulus" style="margin-top:8px"><p><b>Doc '+n+'.</b> '+d.txt+'</p>'+(d.viz?chartSVG(d.viz):'')+'<span class="src">\u2014 '+esc(d.attr)+'</span></div>';}
function dbqBack(){return '<div style="height:10px"></div><button class="btn btn-ghost btn-block" id="dbq-back">'+(DB.p?'Back to Study':'Back to Exam tab')+'</button>';}
function wireBack(){$('#dbq-back').onclick=DB.back;}
function dbqOpen(tool,pn){
  const set=pn===0?EX_SET:DBQ_SETS.find(s=>s.p===pn);
  DB={set,p:pn,view:pn===0?'#view-exam':'#view-study',back:pn===0?renderExamHub:renderStudyHub};
  window.scrollTo(0,0);
  if(tool==='wb')wbDraw();else if(tool==='gg')ggStart();else htStart();
}
function renderWorkbench(){dbqOpen('wb',0);}
function renderGroupGame(){dbqOpen('gg',0);}
function renderHIPP(){dbqOpen('ht',0);}
/* --- Workbench --- */
function wbDraw(){
  const s=DB.set;
  let h='<div class="section-title"><h2>DBQ Workbench'+(DB.p?' \u00b7 Period '+DB.p:'')+'</h2><div class="rule"></div></div>';
  h+='<div class="panel"><b>Prompt:</b> '+s.prompt+'<p style="font-size:13px;color:var(--ink2);margin-top:6px">Six documents, 2027 style. Write a thesis, assign each document to an argument group, check your groupings, then self-score on the 7-point rubric.</p><button class="btn btn-navy" id="wb-timer" style="margin-top:8px;padding:9px 14px;font-size:13.5px">⏱ Start 60:00 exam clock</button><span id="wb-clock" class="mono" style="margin-left:10px;font-weight:700;font-size:15px"></span></div>';
  h+='<div class="panel"><b>1 \u00b7 Your thesis</b><textarea class="saq-box" rows="3" placeholder="A defensible claim answering \u201cto what extent\u201d\u2026"></textarea>'+THESIS_BTN+'</div>';
  h+='<div class="panel"><b>2 \u00b7 Group the documents</b><p style="font-size:13px;color:var(--ink2);margin-top:4px">Arguments: (1) '+s.groups[1]+' \u00b7 (2) '+s.groups[2]+' \u00b7 (3) '+s.groups[3]+'</p>';
  s.docs.forEach((d,i)=>{
    h+=dbqDocBox(d,i+1)+'<select class="saq-box" data-doc="'+i+'" style="margin-top:4px"><option value="0">\u2014 assign to an argument \u2014</option><option value="1">1 \u00b7 '+s.groups[1]+'</option><option value="2">2 \u00b7 '+s.groups[2]+'</option><option value="3">3 \u00b7 '+s.groups[3]+'</option></select><div class="wb-fb" data-fb="'+i+'"></div>';
  });
  h+='<button class="btn btn-navy btn-block" id="wb-check" style="margin-top:10px">Check my groupings</button></div>';

    h+='<div class="panel"><p style="font-size:13px;color:var(--ink2)"><b>Prompt:</b> '+esc(s.pr)+'</p>'+
      '<h3 class="pf" style="font-size:19px;margin-top:8px">Thesis</h3>'+
      '<p style="font-size:14.5px;line-height:1.5;margin-top:6px">Take a position on \u201cto what extent\u201d and preview your line of reasoning in one sentence.</p>'+THESIS_BTN+
      llPickedList(s)+
      '<textarea class="saq-box" rows="4" placeholder="Although\u2026, therefore\u2026"></textarea>'+
      '<label style="display:block;margin-top:8px;font-size:13.5px;line-height:1.45"><input type="checkbox" data-ll-pt="0"'+(LL.earned[0]?' checked':'')+'> '+LEQ_RUBRIC[0]+'</label></div>';
    h+=llNav('Next \u2192');
  }

  else if(LL.i===4){
    const s=LEQ_LAB[LL.set];
    h+='<div class="panel"><p style="font-size:13px;color:var(--ink2)"><b>Prompt:</b> '+esc(s.pr)+'</p>'+
      '<h3 class="pf" style="font-size:19px;margin-top:8px">Write it \u2014 40 minutes</h3>'+
      '<p style="font-size:13.5px;color:var(--ink2);line-height:1.5;margin-top:4px">That is the suggested LEQ time on exam day. Nothing here is saved, so write in your own document if you want to keep it.</p>'+
      '<div style="display:flex;gap:10px;align-items:center;margin-top:8px">'+
        '<button class="btn btn-navy" id="ll-timer">Start 40:00</button>'+
        '<span class="mono" id="ll-clock" style="font-size:20px">40:00</span></div>'+
      llPickedList(s)+
      '<textarea class="saq-box" rows="10" placeholder="Write your essay\u2026"></textarea></div>';
    h+=llNav('Score it \u2192');
  }

  else if(LL.i===5){
    const s=LEQ_LAB[LL.set];
    const pts=LL.earned.filter(Boolean).length;
    h+='<div class="panel"><p style="font-size:13px;color:var(--ink2)"><b>Prompt:</b> '+esc(s.pr)+'</p>'+
      '<h3 class="pf" style="font-size:19px;margin-top:8px">Score your essay</h3>'+
      '<p style="font-size:13.5px;color:var(--ink2);line-height:1.5;margin-top:4px">Be honest \u2014 read for what you actually wrote, not what you meant. Each point is earned independently.</p>';
    LEQ_RUBRIC.forEach(function(r,i){
      h+='<label style="display:block;margin-top:9px;font-size:13.5px;line-height:1.45"><input type="checkbox" data-ll-pt="'+i+'"'+(LL.earned[i]?' checked':'')+'> '+r+'</label>';
    });
    h+='<p class="mono" style="font-size:20px;margin-top:12px"><b>'+pts+' / 6</b></p>'+
      '<p style="font-size:13px;color:var(--ink2);line-height:1.5;margin-top:4px">'+
      (pts>=5?'Exam-ready. Try a prompt from a different part of the course.':
       pts>=3?'Solid core. The points students most often leave behind are contextualization and complexity.':
       'Work the steps again on the same prompt \u2014 the second pass is where the gain is.')+'</p>'+
      '<button class="btn btn-primary btn-block" id="ll-again" style="margin-top:10px">Try another prompt</button>'+
      '<button class="btn btn-ghost btn-block" id="dbq-back" style="margin-top:8px">Back to Exam tab</button></div>';
    h+='<div class="panel" style="font-size:13.5px;line-height:1.6"><b>Compare against the real thing:</b> official released LEQ prompts, scoring guidelines, and sample student essays are on <a href="https://apcentral.collegeboard.org/courses/ap-united-states-history/exam/past-exam-questions" target="_blank" rel="noopener">AP Central</a>. <button class="btn btn-ghost" data-samples style="margin-top:8px;padding:8px 12px;font-size:13px">See annotated samples</button></div>';
  }

  $('#view-exam').innerHTML=h;
  wireLL();
}

function llPickedList(s){
  if(!LL.picked.length) return '';
  let h='<div class="explain" style="margin-top:8px;font-size:13px"><b>Your evidence:</b><br>';
  LL.picked.forEach(function(i){ h+='\u00b7 '+esc(s.ev[i].t)+'<br>'; });
  return h+'</div>';
}

function llCheck(){
  const s=LEQ_LAB[LL.set];
  const picked=LL.picked.map(function(i){ return s.ev[i]; });
  const strong=picked.filter(function(e){ return e.v==='strong'; }).length;
  const off=picked.filter(function(e){ return e.v==='off'; });
  const partial=picked.filter(function(e){ return e.v==='partial'; });
  const periods={};
  picked.forEach(function(e){ periods[e.p]=1; });
  const spread=Object.keys(periods).length;
  let h='<div class="explain" style="line-height:1.55;font-size:13.5px">';
  h+='<b>'+picked.length+' selected \u00b7 '+strong+' strong \u00b7 '+spread+' period'+(spread===1?'':'s')+'</b><br>';
  if(picked.length<4) h+='\u2014 Thin. Four to six pieces gives you room to build more than one paragraph.<br>';
  else if(picked.length>7) h+='\u2014 That is more than you can develop in 40 minutes. Cut to the ones you can explain.<br>';
  if(spread<2) h+='\u2014 All from one period. A prompt this broad rewards evidence from across the course.<br>';
  else if(spread>=3) h+='\u2014 Good spread across the course. That is what the broad prompt is asking for.<br>';
  off.forEach(function(e){ h+='\u2014 <b>Drop it:</b> '+esc(e.t)+'. '+esc(e.why)+'<br>'; });
  partial.forEach(function(e){ h+='\u2014 <b>Risky:</b> '+esc(e.t)+'. '+esc(e.why)+'<br>'; });
  if(strong>=4&&!off.length&&spread>=2) h+='\u2014 This is a workable inventory. Now write the thesis that ties it together.<br>';
  h+='</div>';
  $('#ll-fb').innerHTML=h;
  LL.checked=true;
}

function wireLL(){
  const back=$('#dbq-back'); if(back) back.onclick=DB.back;
  $$('#view-exam [data-ll-set]').forEach(function(b){
    b.onclick=function(){ LL.set=+b.dataset.llSet; LL.picked=[]; drawLL(); };
  });
  $$('#view-exam [data-ll-ev]').forEach(function(b){
    b.onclick=function(){
      const i=+b.dataset.llEv, at=LL.picked.indexOf(i);
      if(at>-1) LL.picked.splice(at,1); else LL.picked.push(i);
      drawLL();
      if(LL.checked) llCheck();
    };
  });
  const chk=$('#ll-check'); if(chk) chk.onclick=llCheck;
  $$('#view-exam [data-ll-pt]').forEach(function(c){
    c.onchange=function(){
      LL.earned[+c.dataset.llPt]=c.checked;
      const pill=$$('#view-exam .quiz-meta .pill')[1];
      if(pill) pill.textContent=LL.earned.filter(Boolean).length+' / 6 pts';
      if(LL.i===5) drawLL();
    };
  });
  const t=$('#ll-timer');
  if(t) t.onclick=function(){
    killTimer(); t.disabled=true; let left=2400;
    QTIMER=setInterval(function(){
      const c=$('#ll-clock'); if(!c){ killTimer(); return; }
      left--;
      const m=Math.floor(left/60), sec=left%60;
      c.textContent=m+':'+(sec<10?'0':'')+sec;
      if(left<=300) c.style.color='var(--rust)';
      if(left<=0){ killTimer(); c.textContent='Time'; }
    },1000);
  };
  const ag=$('#ll-again'); if(ag) ag.onclick=renderLEQLab;
  const prev=$('#ll-prev'); if(prev) prev.onclick=function(){ if(LL.i>0){ LL.i--; drawLL(); } };
  const next=$('#ll-next'); if(next) next.onclick=function(){ if(LL.i<5){ LL.i++; drawLL(); } };
}

function renderExamHub(){
  let h='<div class="section-title"><h2>The AP Exam</h2><div class="rule"></div></div>';
  h+=cramPanel();
  h+='<div class="panel">'+EXAM_FMT+'</div>';
  h+='<div class="panel"><b>🧪 DBQ Lab</b><p style="font-size:13.5px;color:var(--ink2);line-height:1.5;margin-top:4px">Interactive document-based practice built on adapted public-domain sources. New to the DBQ? Climb the steps in order — each one builds on the last.</p>'+
  '<button class="btn btn-navy btn-block" id="dbq-ht" style="margin-top:8px">1 · HIPP Trainer — sourcing drills</button><div style="height:8px"></div>'+
  '<button class="btn btn-navy btn-block" id="dbq-gg">2 · Grouping Game — docs to arguments</button><div style="height:8px"></div>'+
  '<button class="btn btn-primary btn-block" id="dbq-wb">3 · DBQ Workbench — full document set</button><div style="height:8px"></div>'+
  '<button class="btn btn-navy btn-block" id="dbq-rs">4 · Rubric Simulator — build the whole essay</button></div>'+
  '<div class="panel"><b>✍️ LEQ Lab</b><p style="font-size:13.5px;color:var(--ink2);line-height:1.5;margin-top:4px">The 2027 LEQ gives one broad prompt spanning the course — you choose the evidence. Six steps: context, evidence inventory, thesis, a timed write, then score yourself against the 6-point rubric.</p>'+
  '<button class="btn btn-primary btn-block" id="leq-lab" style="margin-top:8px">Open LEQ Lab</button></div>';
  h+='<div class="panel" style="font-size:14.5px;line-height:1.7"><b>Official College Board materials</b><br>'+
  'Real released items are College Board\'s secure, copyrighted materials, so they aren\'t bundled into this app — use them at the source:<br>'+
  '• <a href="https://apcentral.collegeboard.org/courses/ap-united-states-history/exam/past-exam-questions" target="_blank" rel="noopener">Past Exam Questions</a> — every released DBQ, LEQ, and SAQ, with scoring guidelines and real scored student samples<br>'+
  '• <a href="https://apcentral.collegeboard.org/courses/ap-united-states-history/exam" target="_blank" rel="noopener">Official APUSH exam page</a> — format, rubrics, and the updated CED<br>'+
  '• <a href="https://apcentral.collegeboard.org/courses/ap-history-exam-updates" target="_blank" rel="noopener">2027 Exam Updates</a> — the official summary of what changed<br>'+
  '• <b>Full practice exams with MCQ sections</b> live in AP Classroom — two official 2027-format practice exams are being released during the 2026–27 school year. Ask your teacher to assign them.</div>';
  h+='<div class="panel" style="font-size:14px;line-height:1.6"><b>Using this app to prep:</b> the Quiz tab drills every CED lesson with instant explanations, missed questions recycle into review, and the Study tab\'s LEQ prompts (with exemplar outlines) practice the new single-prompt format. Save the official practice exams for timed, test-condition runs.</div>';
  $('#view-exam').innerHTML=h;
  $('#dbq-wb').onclick=renderWorkbench;$('#dbq-gg').onclick=renderGroupGame;$('#leq-lab').onclick=renderLEQLab;
  $('#dbq-ht').onclick=renderHIPP;$('#dbq-rs').onclick=renderRubricSim;
  wireCram();
}

/* ================= CARDS ================= */
function renderCards(){
  const total=CARDS.length,own=S.collected.length,done=own>=total;
  let h='<div class="coinbar"><span>'+COIN+' <b class="mono">'+S.coins+'</b> coins</span><span>'+PACK+' <b class="mono">'+S.freePacks+'</b> free packs</span><span class="mono">'+own+'/'+total+'</span></div>';
  if(done)h+='<div class="banner-done">🏆 Collection Complete! Every card from 1491 to now is yours.</div>';
  else{
    h+='<div class="panel" style="text-align:center"><p style="font-size:14px;margin-bottom:10px">Packs cost <b>3 coins</b> · every 3 correct answers = 1 free pack</p>';
    h+='<button class="btn btn-primary btn-block" id="open-pack" '+((S.freePacks>0||S.coins>=3)?'':'disabled')+'>'+(S.freePacks>0?'Open free pack '+PACK:'Open pack (3 '+COIN+')')+'</button></div>';
  }
  PERIODS.concat([{n:0,y:'Era of Greatness'}]).forEach(p=>{
    const set=CARDS.filter(c=>c.p===p.n);
    if(!set.length)return;
    const ownCt=set.filter(c=>S.collected.includes(c.id)).length;
    h+='<div class="section-title"><h2 style="font-size:17px">'+(p.n===0?'✨ Mythical':'Period '+p.n)+'</h2><div class="rule"></div><span class="mono" style="font-size:11px;color:var(--ink2)">'+ownCt+'/'+set.length+'</span></div>';
    h+='<div class="collection-grid">';
    set.forEach(c=>{
      const has=S.collected.includes(c.id);
      h+='<button class="mini-card '+(has?'owned':'locked')+'" '+(has?'data-view="'+c.id+'"':'disabled')+' style="'+(has?'border-color:var(--c-'+c.r+')':'')+'">'+
      '<div class="thumb"'+(has?' data-th="'+c.id+'"':'')+'>'+(has?EL[c.el][0]:'🔒')+'</div><div class="nm">'+(has?esc(c.name):'???')+'</div>'+
      '<div class="rr" style="color:var(--c-'+c.r+')">'+RAR[c.r].l+'</div></button>';
    });
    h+='</div>';
  });
  $('#view-cards').innerHTML=h;
  const op=$('#open-pack');if(op)op.onclick=openPack;
  $$('#view-cards [data-view]').forEach(b=>b.onclick=()=>showCardModal(CARDS.find(c=>c.id===b.dataset.view),false));
  $$('#view-cards [data-th]').forEach(d=>setPortrait(d,CARDS.find(c=>c.id===d.dataset.th)));
}
function drawCard(){
  const un=CARDS.filter(c=>!S.collected.includes(c.id));
  if(!un.length)return null;
  const avail={};un.forEach(c=>{(avail[c.r]=avail[c.r]||[]).push(c);});
  const rs=Object.keys(avail);
  const tw=rs.reduce((s,r)=>s+RAR[r].w,0);
  let roll=Math.random()*tw;
  for(const r of rs){roll-=RAR[r].w;if(roll<=0){const set=avail[r];return set[Math.floor(Math.random()*set.length)];}}
  const set=avail[rs[rs.length-1]];return set[Math.floor(Math.random()*set.length)];
}
function openPack(){
  if(S.freePacks>0)S.freePacks--;
  else if(S.coins>=3)S.coins-=3;
  else return;
  const card=drawCard();
  if(!card){save();renderCards();return;}
  S.collected.push(card.id);save();
  showCardModal(card,true);
}
function cardHTML(card){
  const e=EL[card.el],classic=(card.r==='common'||card.r==='uncommon');
  if(classic){
    return '<div class="tcg lay-c r-'+card.r+'"><div class="inner">'+
    '<div class="head"><span class="nm">'+esc(card.name)+'</span><span class="hp">'+e[0]+' HP '+card.hp+'</span></div>'+
    '<div class="art" data-cid="'+card.id+'">'+portraitHTML(card)+'</div>'+
    '<div class="subtitle"><span class="ttl">'+esc(card.ttl)+'</span><span class="yrs">'+esc(card.yrs)+'</span></div>'+
    '<span class="badge">'+card.t+' \u00b7 '+e[1]+'</span>'+
    '<div class="factbox">'+esc(card.fact)+'</div>'+
    '<div class="foot"><span class="stars" style="color:var(--c-'+card.r+')">'+stars(RAR[card.r].s)+'</span><span>'+RAR[card.r].l.toUpperCase()+' \u00b7 No. '+(CARDS.indexOf(card)+1)+'/'+CARDS.length+'</span></div>'+
    '</div></div>';
  }
  return '<div class="tcg r-'+card.r+'"><div class="inner">'+
  '<div class="art" data-cid="'+card.id+'">'+portraitHTML(card)+'</div>'+
  (card.r==='mythical'?'<div class="sparkles"></div>':'')+
  '<div class="scrim-top"><span class="nm">'+esc(card.name)+'</span><span class="hp">'+e[0]+' HP '+card.hp+'</span></div>'+
  '<div class="scrim-bot">'+
  '<div class="subtitle"><span class="ttl">'+esc(card.ttl)+'</span><span class="yrs">'+esc(card.yrs)+'</span></div>'+
  '<span class="badge">'+card.t+' \u00b7 '+e[1]+'</span>'+
  '<div class="factbox">'+esc(card.fact)+'</div>'+
  '<div class="foot"><span class="stars" style="color:var(--c-'+card.r+')">'+stars(RAR[card.r].s)+'</span><span>'+RAR[card.r].l.toUpperCase()+' \u00b7 No. '+(CARDS.indexOf(card)+1)+'/'+CARDS.length+'</span></div>'+
  '</div></div></div>';
}
function showCardModal(card,fresh){
  const m=$('#modal');
  m.classList.remove('hidden');
  m.innerHTML='<div class="modal-note">'+(fresh?'✦ New card pulled ✦':'From your collection')+'</div>'+cardHTML(card)+
  '<button class="btn btn-primary" id="close-modal">'+(fresh?'Add to collection':'Close')+'</button>';
  setPortrait($('.art',m),card);
  $('#close-modal').onclick=()=>{m.classList.add('hidden');m.innerHTML='';renderCards();};
}

/* ================= STARTUP ================= */
async function prefetch(){
  const owned=CARDS.filter(c=>S.collected.includes(c.id)&&c.wiki&&IMG[c.id]===undefined).slice(0,12);
  const t=setTimeout(hideLoader,4500);
  await Promise.all(owned.map(c=>fetchImg(c).catch(()=>null)));
  clearTimeout(t);hideLoader();
}
function hideLoader(){const l=$('#loader');if(l)l.remove();}
renderHome();
prefetch();
</script>
